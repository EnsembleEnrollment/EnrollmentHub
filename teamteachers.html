<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Directory - Enrollment Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #FA8072;
            --primary-light: #FFB4A2;
            --primary-dark: #E96E5D;
            --secondary: #FF6B9D;
            --secondary-light: #FFB6C1;
            --accent: #FFA07A;
            --accent-light: #FFCBA4;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --text-primary: #2D3748;
            --text-secondary: #718096;
            --text-light: #A0AEC0;
            --white: #FFFFFF;
            --gray-50: #F8F9FA;
            --gray-100: #F1F3F5;
            --gray-200: #E9ECEF;
            --gray-300: #DEE2E6;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --shadow-sm: 0 2px 4px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px 0 rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 30px 0 rgba(0, 0, 0, 0.12);
            --shadow-xl: 0 20px 40px 0 rgba(0, 0, 0, 0.15);
            --sidebar-width: 260px;
            --sidebar-collapsed: 70px;
            --transition-speed: 0.3s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #F8F9FA;
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed; top: 0; left: 0;
            width: var(--sidebar-width); height: 100vh;
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition-speed) ease, width var(--transition-speed) ease;
            z-index: 1000; display: flex; flex-direction: column;
        }
        .sidebar.collapsed { width: var(--sidebar-collapsed); }
        .sidebar-header {
            padding: 1.5rem 1.25rem; display: flex; align-items: center;
            justify-content: space-between; border-bottom: 1px solid var(--gray-200);
        }
        .logo-section { display: flex; align-items: center; gap: 0.75rem; transition: opacity var(--transition-speed) ease; }
        .sidebar.collapsed .logo-section { opacity: 0; pointer-events: none; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem; flex-shrink: 0; color: var(--white); font-weight: 700;
        }
        .logo-text { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); white-space: nowrap; }
        .toggle-btn {
            width: 32px; height: 32px; border: 1px solid var(--gray-200);
            background: var(--white); color: var(--text-secondary); border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; flex-shrink: 0;
        }
        .toggle-btn:hover { background: var(--gray-50); border-color: var(--gray-300); }
        .sidebar.collapsed .toggle-icon { transform: rotate(180deg); }
        .toggle-icon { transition: transform var(--transition-speed) ease; font-size: 1rem; }
        .sidebar-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 1rem 0; }
        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 2px; }
        .nav-item {
            display: flex; align-items: center; gap: 0.875rem;
            padding: 0.875rem 1.5rem; margin: 0.25rem 0.75rem;
            color: var(--text-secondary); text-decoration: none; border-radius: 10px;
            transition: all 0.2s ease; cursor: pointer; border: none;
            background: transparent; width: calc(100% - 1.5rem);
            font-size: 0.9375rem; font-weight: 500;
        }
        .nav-item:hover { background: var(--gray-100); color: var(--text-primary); }
        .nav-item.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: var(--white); box-shadow: 0 4px 12px rgba(250, 128, 114, 0.3);
        }
        .nav-icon { font-size: 1.25rem; flex-shrink: 0; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
        .nav-text { white-space: nowrap; transition: opacity var(--transition-speed) ease; }
        .sidebar.collapsed .nav-text { opacity: 0; pointer-events: none; }
        .sidebar.collapsed .nav-item { justify-content: center; padding: 0.875rem; }
        .sidebar-footer { padding: 0.5rem 0 1rem 0; border-top: 1px solid var(--gray-200); }
        .logout-btn { color: var(--secondary) !important; }
        .logout-btn:hover { background: rgba(255, 107, 157, 0.1) !important; }
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 999;
            opacity: 0; pointer-events: none; transition: opacity var(--transition-speed) ease;
        }
        .sidebar-overlay.active { opacity: 1; pointer-events: all; }

        .main-content {
            margin-left: var(--sidebar-width); min-height: 100vh; padding: 2rem 2.5rem;
            transition: margin-left var(--transition-speed) ease;
        }
        .sidebar.collapsed ~ .main-content { margin-left: var(--sidebar-collapsed); }

        /* Page Header */
        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 2rem; color: var(--text-primary); margin-bottom: 0.5rem; font-weight: 700; letter-spacing: -0.02em; }
        .page-header p { color: var(--text-secondary); font-size: 1rem; }

        /* ============ FILTER SECTION ============ */
        .filter-section {
            background: var(--white); border-radius: 16px; padding: 1.5rem;
            box-shadow: var(--shadow-md); margin-bottom: 1.5rem;
        }
        .filter-header {
            display: flex; align-items: center; justify-content: space-between;
            cursor: pointer; user-select: none;
        }
        .filter-header-left { display: flex; align-items: center; gap: 0.625rem; }
        .filter-header-left h3 { font-size: 1rem; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 0.5rem; }
        .filter-header-left h3 i { color: var(--primary); }

        /* Active filter count badge */
        .filter-count-badge {
            display: none; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; font-size: 0.6875rem; font-weight: 700;
            width: 20px; height: 20px; border-radius: 50%;
        }
        .filter-count-badge.visible { display: flex; }

        .filter-header-right { display: flex; align-items: center; gap: 0.75rem; }
        .reset-filters-btn {
            display: flex; align-items: center; gap: 0.375rem;
            padding: 0.5rem 0.875rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; border-radius: 8px;
            font-size: 0.8125rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s; box-shadow: 0 2px 6px rgba(250, 128, 114, 0.3);
        }
        .reset-filters-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(250, 128, 114, 0.4); }
        .filter-toggle-icon { color: var(--text-secondary); font-size: 0.875rem; transition: transform 0.2s ease; }
        .filter-toggle-icon.collapsed { transform: rotate(-90deg); }

        /* Primary filters — always visible */
        .filter-primary {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem; margin-top: 1.25rem;
        }
        .filter-primary.hidden { display: none; }

        /* More filters — toggleable */
        .more-filters-toggle {
            display: flex; align-items: center; gap: 0.5rem;
            margin-top: 1rem; padding: 0.5rem 0;
            border: none; background: none; cursor: pointer;
            font-size: 0.8125rem; font-weight: 600; color: var(--text-secondary);
            transition: color 0.2s;
        }
        .more-filters-toggle:hover { color: var(--primary); }
        .more-filters-toggle i { font-size: 0.75rem; transition: transform 0.2s; }
        .more-filters-toggle.open i { transform: rotate(180deg); }
        .more-filters-toggle.open { color: var(--primary); }

        .filter-secondary {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem; margin-top: 0.75rem;
            padding-top: 0.75rem; border-top: 1px dashed var(--gray-200);
        }
        .filter-secondary.open { display: grid; }

        /* Search */
        .search-input-wrapper { position: relative; grid-column: 1 / -1; }
        .search-input-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .search-input {
            width: 100%; padding: 0.75rem 1rem 0.75rem 2.75rem;
            background: var(--gray-50); border: 1.5px solid var(--gray-200);
            border-radius: 10px; font-size: 0.9375rem; color: var(--text-primary); transition: all 0.2s ease;
        }
        .search-input:focus { outline: none; border-color: var(--primary); background: var(--white); box-shadow: 0 0 0 3px rgba(250, 128, 114, 0.1); }

        .filter-group label {
            display: block; font-size: 0.75rem; font-weight: 600;
            color: var(--text-secondary); margin-bottom: 0.375rem;
            text-transform: uppercase; letter-spacing: 0.03em;
        }
        .filter-select {
            width: 100%; padding: 0.625rem 0.875rem;
            border: 1.5px solid var(--gray-200); border-radius: 10px;
            font-size: 0.875rem; color: var(--text-primary); background: var(--white); transition: all 0.2s ease;
        }
        .filter-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(250, 128, 114, 0.1); }

        /* Zone Tabs */
        .zone-filter-tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; grid-column: 1 / -1; }
        .zone-tab {
            padding: 0.5rem 1rem; font-size: 0.8125rem; font-weight: 600;
            color: var(--text-secondary); background: var(--gray-50);
            border: 1.5px solid var(--gray-200); border-radius: 20px;
            cursor: pointer; transition: all 0.2s ease;
        }
        .zone-tab:hover { border-color: var(--primary); color: var(--primary); }
        .zone-tab.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white; border-color: transparent;
            box-shadow: 0 2px 8px rgba(250, 128, 114, 0.3);
        }

        /* Instrument Checkboxes */
        .instrument-filter-section { grid-column: 1 / -1; }
        .instrument-filter-label { font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.03em; }
        .instrument-checkbox-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .instrument-checkbox {
            display: flex; align-items: center; gap: 0.375rem;
            padding: 0.5rem 0.875rem; background: var(--gray-50);
            border: 1.5px solid var(--gray-200); border-radius: 20px;
            cursor: pointer; transition: all 0.2s; user-select: none;
            font-size: 0.8125rem; font-weight: 500; color: var(--text-primary);
        }
        .instrument-checkbox:hover { border-color: var(--primary-light); }
        .instrument-checkbox.selected {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(250,128,114,0.12), rgba(255,160,122,0.12));
            color: var(--primary-dark);
        }
        .instrument-checkbox .check-icon {
            width: 16px; height: 16px; border: 2px solid var(--gray-300); border-radius: 3px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.625rem; color: transparent; transition: all 0.2s; flex-shrink: 0;
        }
        .instrument-checkbox.selected .check-icon {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-color: transparent; color: white;
        }
        .selected-instruments-info { margin-top: 0.5rem; font-size: 0.75rem; color: var(--primary-dark); font-style: italic; font-weight: 500; }

        /* Active filter chips */
        .active-filters { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; grid-column: 1 / -1; }
        .active-filters:empty { display: none; }
        .filter-chip {
            display: inline-flex; align-items: center; gap: 0.375rem;
            padding: 0.375rem 0.75rem; background: rgba(250, 128, 114, 0.1);
            color: var(--primary-dark); border-radius: 20px; font-size: 0.8125rem; font-weight: 600;
        }
        .filter-chip button {
            background: none; border: none; color: var(--primary-dark); cursor: pointer;
            font-size: 0.875rem; padding: 0; line-height: 1; opacity: 0.7; transition: opacity 0.2s;
        }
        .filter-chip button:hover { opacity: 1; }
        .clear-all-btn {
            background: none; border: 1.5px solid var(--gray-200); color: var(--text-secondary);
            padding: 0.375rem 0.75rem; border-radius: 20px; font-size: 0.8125rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .clear-all-btn:hover { border-color: var(--danger); color: var(--danger); }

        /* ============ RESULTS ============ */
        .results-info {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem;
        }
        .results-count { font-size: 0.9375rem; color: var(--text-secondary); font-weight: 500; }
        .results-count strong { color: var(--text-primary); }

        /* ============ TEACHER GRID ============ */
        .teachers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }

        /* ============ TEACHER CARD ============ */
        .teacher-card {
            background: var(--white); border: 1px solid var(--gray-200);
            border-radius: 14px; overflow: hidden; box-shadow: var(--shadow-sm);
            transition: all 0.2s ease; display: flex; flex-direction: column;
            cursor: pointer;
        }
        .teacher-card:hover { border-color: var(--primary-light); box-shadow: var(--shadow-md); transform: translateY(-2px); }

        .teacher-card-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            padding: 1.25rem; color: white; position: relative;
            display: flex; align-items: center; gap: 1rem;
        }

        /* Photo avatar on card */
        .card-avatar {
            width: 54px; height: 54px; border-radius: 50%;
            background: rgba(255,255,255,0.25); border: 2.5px solid rgba(255,255,255,0.5);
            flex-shrink: 0; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem; font-weight: 700; color: white;
        }
        .card-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .card-header-text { flex: 1; min-width: 0; }
        .teacher-card-name { font-size: 1.0625rem; font-weight: 700; margin-bottom: 0.125rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .teacher-card-brand { font-size: 0.8125rem; opacity: 0.9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .teacher-card-body { padding: 1rem 1.25rem 1.25rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }

        .teacher-info-row {
            display: flex; align-items: center; gap: 0.625rem; font-size: 0.875rem;
        }
        .teacher-info-row i { color: var(--primary); width: 15px; text-align: center; font-size: 0.8125rem; flex-shrink: 0; }
        .teacher-info-row span { color: var(--text-secondary); line-height: 1.4; }

        /* Mini comfort bar on card */
        .card-comfort-row {
            display: flex; align-items: center; gap: 0.625rem; font-size: 0.875rem;
        }
        .card-comfort-row i { color: var(--primary); width: 15px; text-align: center; font-size: 0.8125rem; flex-shrink: 0; }
        .card-comfort-bar-wrap { flex: 1; display: flex; align-items: center; gap: 0.5rem; }
        .card-comfort-bar {
            flex: 1; height: 6px; background: var(--gray-200);
            border-radius: 3px; overflow: hidden;
        }
        .card-comfort-fill {
            height: 100%; border-radius: 3px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
        }
        .card-comfort-label { font-size: 0.75rem; font-weight: 700; color: var(--primary-dark); min-width: 30px; }

        /* Instrument chips on card — bigger and more prominent */
        .teacher-instruments-list { margin-top: 0.25rem; }
        .teacher-instruments-label {
            font-size: 0.6875rem; font-weight: 700; color: var(--text-primary);
            text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.5rem;
        }
        .instrument-chip-row { display: flex; flex-wrap: wrap; gap: 0.375rem; }
        .instrument-chip {
            display: inline-flex; align-items: center; gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            background: var(--gray-50); border: 1.5px solid var(--gray-200);
            border-radius: 20px; font-size: 0.8125rem; font-weight: 600;
            color: var(--text-primary); transition: all 0.15s;
        }
        .teacher-card:hover .instrument-chip { border-color: var(--primary-light); }
        .instrument-chip .level-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .level-beginner { background: var(--success); }
        .level-intermediate { background: var(--warning); }
        .level-advanced { background: var(--primary); }

        /* Bio expand on card */
        .card-bio-toggle {
            display: inline-flex; align-items: center; gap: 0.375rem;
            background: none; border: 1.5px solid var(--gray-200);
            color: var(--text-secondary); border-radius: 20px;
            padding: 0.3rem 0.75rem; font-size: 0.75rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s; margin-top: 0.5rem;
        }
        .card-bio-toggle:hover { border-color: var(--primary); color: var(--primary); }
        .card-bio-toggle.open { border-color: var(--primary); color: var(--primary); background: rgba(250,128,114,0.06); }
        .card-bio-toggle i { font-size: 0.625rem; transition: transform 0.2s; }
        .card-bio-toggle.open i { transform: rotate(180deg); }
        .card-bio-panel {
            display: none; font-size: 0.8125rem; color: var(--text-secondary);
            line-height: 1.6; margin-top: 0.625rem;
            padding: 0.75rem; background: var(--gray-50);
            border-radius: 8px; border-left: 3px solid var(--primary-light);
        }
        .card-bio-panel.open { display: block; }

        /* Badges at bottom of card */
        .teacher-badges { display: flex; flex-wrap: wrap; gap: 0.375rem; margin-top: auto; padding-top: 0.625rem; }
        .teacher-badge {
            padding: 0.2rem 0.5rem; border-radius: 6px;
            font-size: 0.6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em;
        }
        .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .badge-info { background: rgba(250, 128, 114, 0.1); color: var(--primary); }
        .badge-purple { background: rgba(139, 92, 246, 0.1); color: #8B5CF6; }

        /* ============ MODAL ============ */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000;
            align-items: center; justify-content: center; padding: 1rem;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white; border-radius: 16px; max-width: 700px; width: 100%;
            max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-xl);
        }
        .modal-header {
            padding: 1.5rem; border-bottom: 1px solid var(--gray-200);
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; background: white; z-index: 10;
        }
        .modal-title { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
        .modal-close {
            width: 32px; height: 32px; border: none; background: var(--gray-100);
            color: var(--text-secondary); border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        .modal-close:hover { background: var(--gray-200); }
        .modal-body { padding: 0; }

        /* Modal hero with photo */
        .modal-hero {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            padding: 1.75rem 1.5rem; display: flex; align-items: center; gap: 1.25rem;
        }
        .modal-avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,255,255,0.25); border: 3px solid rgba(255,255,255,0.5);
            flex-shrink: 0; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: 700; color: white;
        }
        .modal-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .modal-hero-text h2 { font-size: 1.375rem; font-weight: 700; color: white; margin-bottom: 0.25rem; }
        .modal-hero-text p { font-size: 0.9375rem; color: rgba(255,255,255,0.9); }

        .modal-inner { padding: 1.5rem; }

        /* Bio at top of modal */
        .modal-bio {
            background: var(--gray-50); border-radius: 10px;
            padding: 1rem 1.125rem; margin-bottom: 1.5rem;
            font-size: 0.9375rem; color: var(--text-primary); line-height: 1.65;
            border-left: 3px solid var(--primary-light);
        }

        .detail-section { margin-bottom: 1.5rem; }
        .detail-section-title {
            font-size: 0.8125rem; font-weight: 700; color: var(--primary);
            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem;
            padding-bottom: 0.5rem; border-bottom: 2px solid var(--gray-100);
        }
        .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
        .detail-item label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-light); margin-bottom: 0.125rem; }
        .detail-item p { font-size: 0.9375rem; color: var(--text-primary); }

        /* Comfort bar in modal — moved up */
        .modal-comfort-display {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem 1.125rem; background: var(--gray-50); border-radius: 10px; margin-bottom: 1rem;
        }
        .modal-comfort-bar-wrap { flex: 1; }
        .modal-comfort-bar-label { font-size: 0.8125rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .modal-comfort-bar { height: 10px; background: var(--gray-200); border-radius: 5px; overflow: hidden; }
        .modal-comfort-fill {
            height: 100%; border-radius: 5px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            transition: width 0.4s ease;
        }
        .modal-comfort-value { font-size: 1.375rem; font-weight: 700; color: var(--primary); min-width: 52px; text-align: center; }

        /* Strengths as pill badges */
        .strengths-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .strength-pill {
            display: inline-flex; align-items: center; gap: 0.375rem;
            padding: 0.5rem 0.875rem;
            background: rgba(250, 128, 114, 0.08);
            border: 1.5px solid rgba(250, 128, 114, 0.2);
            border-radius: 20px; font-size: 0.875rem; font-weight: 500;
            color: var(--primary-dark);
        }
        .strength-pill i { font-size: 0.75rem; color: var(--primary); }

        .detail-instrument-card {
            background: var(--gray-50); border: 1px solid var(--gray-200);
            border-radius: 10px; padding: 1rem; margin-bottom: 0.75rem;
        }
        .detail-instrument-name { font-size: 1rem; font-weight: 700; color: var(--primary); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .detail-instrument-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
        .detail-instrument-grid label { font-size: 0.6875rem; }
        .detail-instrument-grid p { font-size: 0.8125rem; }

        .special-needs-row {
            display: flex; align-items: center; gap: 0.5rem;
            font-size: 0.9375rem; color: var(--text-primary); margin-top: 0.5rem;

        .special-needs-row i { color: var(--success); }

        /* Empty & Loading */
        .empty-state { text-align: center; padding: 3rem 1.5rem; color: var(--text-secondary); grid-column: 1 / -1; }
        .empty-state i { font-size: 3rem; color: var(--gray-300); margin-bottom: 0.75rem; display: block; }
        .empty-state p { font-size: 1rem; }
        .loading { display: flex; align-items: center; justify-content: center; min-height: 400px; color: var(--text-secondary); font-size: 1.125rem; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar:not(.collapsed) { transform: translateX(0); }

    <script>
        const SUPABASE_URL = 'https://kvyvjwepfrqqkvyyutdw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2eXZqd2VwZnJxcWt2eXl1dGR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMjgyOTgsImV4cCI6MjA4MjgwNDI5OH0.ZayLxzQCEFENvQ9FwpLm4x2le2Y9kJvSslX8DVRzAh8';

        let supabaseClient;
        let teachers = [];
        let brands = [];
        let zones = [];
        let activeZone = 'all';
        let selectedInstruments = [];
        let filtersExpanded = true;
        let moreFiltersOpen = false;

        document.addEventListener('DOMContentLoaded', () => {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            setupSidebar();
            setupFilterListeners();
            loadData();
        });

        function setupSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggleBtn = document.getElementById('sidebarToggle');
            const overlay = document.getElementById('sidebarOverlay');
            toggleBtn.addEventListener('click', () => {
                sidebar.classList.toggle('collapsed');
                if (window.innerWidth <= 768 && !sidebar.classList.contains('collapsed')) overlay.classList.add('active');
                else overlay.classList.remove('active');
            });
            overlay.addEventListener('click', () => { sidebar.classList.add('collapsed'); overlay.classList.remove('active'); });
            document.getElementById('logoutBtn').addEventListener('click', () => {
                if (confirm('Are you sure you want to logout?')) window.location.href = 'index.html';
            });
        }

        function setupFilterListeners() {
            document.getElementById('teacherSearch').addEventListener('input', applyFilters);
            ['filterCity', 'filterLevel', 'filterGenre', 'filterAge', 'filterLanguage', 'filterComfort', 'filterSpecialNeeds', 'filterFormalEd']
                .forEach(id => document.getElementById(id).addEventListener('change', applyFilters));
        }

        // ============ TOGGLE FILTERS ============
        function toggleFilters() {
            filtersExpanded = !filtersExpanded;
            document.getElementById('filterPrimary').classList.toggle('hidden', !filtersExpanded);
            document.getElementById('moreFiltersToggle').style.display = filtersExpanded ? '' : 'none';
            if (!filtersExpanded && moreFiltersOpen) {
                moreFiltersOpen = false;
                document.getElementById('filterSecondary').classList.remove('open');
                document.getElementById('moreFiltersToggle').classList.remove('open');
            }
            document.getElementById('filterToggleIcon').classList.toggle('collapsed', !filtersExpanded);
        }

        function toggleMoreFilters() {
            moreFiltersOpen = !moreFiltersOpen;
            document.getElementById('filterSecondary').classList.toggle('open', moreFiltersOpen);
            document.getElementById('moreFiltersToggle').classList.toggle('open', moreFiltersOpen);
            document.getElementById('moreFiltersToggle').querySelector('span') &&
                (document.getElementById('moreFiltersToggle').childNodes[1].textContent = moreFiltersOpen ? ' Fewer filters' : ' More filters');
            // update text node
            const btn = document.getElementById('moreFiltersToggle');
            btn.childNodes.forEach(n => { if (n.nodeType === 3) n.textContent = moreFiltersOpen ? ' Fewer filters' : ' More filters'; });
        }

        // ============ LOAD DATA ============
        async function loadData() {
            try {
                const [teachersRes, citiesRes, languagesRes, instrumentsRes, brandsRes, zonesRes] = await Promise.all([
                    supabaseClient.from('teachers').select('*').eq('status', 'active').order('first_name'),
                    supabaseClient.from('teacher_cities').select('*'),
                    supabaseClient.from('teacher_languages').select('*'),
                    supabaseClient.from('teacher_instruments').select('*'),
                    supabaseClient.from('brands').select('*'),
                    supabaseClient.from('zones').select('*')
                ]);
                if (teachersRes.error) throw teachersRes.error;

                zones = zonesRes.data || [];
                brands = (brandsRes.data || []).map(b => ({ ...b, zone: zones.find(z => z.id === b.zone_id) }));

                teachers = (teachersRes.data || []).map(t => {
                    const matchedBrand = brands.find(b => b.name === t.brand);
                    return {
                        ...t,
                        cities: (citiesRes.data || []).filter(c => c.teacher_id === t.id),
                        languages: (languagesRes.data || []).filter(l => l.teacher_id === t.id),
                        instruments: (instrumentsRes.data || []).filter(i => i.teacher_id === t.id),
                        brandData: matchedBrand || null,
                        zone: matchedBrand?.zone || null
                    };
                });

                populateFilterOptions();
                renderZoneTabs();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                applyFilters();
                checkUrlForBrand();

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loading').innerHTML = '<p style="color: red;">Error loading data. Please refresh.</p>';
            }
        }

        function checkUrlForBrand() {
            const params = new URLSearchParams(window.location.search);
            const brand = params.get('brand');
            if (!brand) return;
            const brandSelect = document.getElementById('filterBrand');
            const match = [...brandSelect.options].find(o => o.value === brand);
            if (match) {
                brandSelect.value = brand;
                updateCityOptions();
                applyFilters();
                setTimeout(() => document.getElementById('content').scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
            }
        }

        function populateFilterOptions() {
            const states = [...new Set(teachers.map(t => t.state).filter(Boolean))].sort();
            populateSelect('filterState', states, 'All States');
            updateBrandOptions();
            updateCityOptions();
            renderInstrumentCheckboxes();
            const languageNames = [...new Set(teachers.flatMap(t => t.languages.map(l => l.language)).filter(Boolean))].sort();
            populateSelect('filterLanguage', languageNames, 'All Languages');
            const allGenres = new Set();
            teachers.forEach(t => t.instruments.forEach(i => {
                if (i.genres) i.genres.split(',').forEach(g => { const tr = g.trim(); if (tr) allGenres.add(tr); });
            }));
            populateSelect('filterGenre', [...allGenres].sort(), 'All Genres');
        }

        function onStateFilterChange() {
            document.getElementById('filterBrand').value = '';
            document.getElementById('filterCity').value = '';
            updateBrandOptions();
            updateCityOptions();
            applyFilters();
        }

        function onBrandFilterChange() {
            document.getElementById('filterCity').value = '';
            updateCityOptions();
            applyFilters();
        }

        function updateBrandOptions() {
            const selectedState = document.getElementById('filterState').value;
            const filtered = selectedState ? teachers.filter(t => t.state === selectedState) : teachers;
            const brandNames = [...new Set(filtered.map(t => t.brand).filter(Boolean))].sort();
            const cur = document.getElementById('filterBrand').value;
            populateSelect('filterBrand', brandNames, 'All Brands');
            if (brandNames.includes(cur)) document.getElementById('filterBrand').value = cur;
        }

        function updateCityOptions() {
            const selectedState = document.getElementById('filterState').value;
            const selectedBrand = document.getElementById('filterBrand').value;
            let filtered = teachers;
            if (selectedState) filtered = filtered.filter(t => t.state === selectedState);
            if (selectedBrand) filtered = filtered.filter(t => t.brand === selectedBrand);
            const cityNames = [...new Set(filtered.flatMap(t => t.cities.map(c => c.city)).filter(Boolean))].sort();
            const cur = document.getElementById('filterCity').value;
            populateSelect('filterCity', cityNames, 'All Cities');
            if (cityNames.includes(cur)) document.getElementById('filterCity').value = cur;
        }

        function renderInstrumentCheckboxes() {
            const instrumentNames = [...new Set(teachers.flatMap(t => t.instruments.map(i => i.instrument)).filter(Boolean))].sort();
            const container = document.getElementById('instrumentCheckboxGrid');
            container.innerHTML = instrumentNames.map(inst => {
                const isSelected = selectedInstruments.includes(inst);
                return `<div class="instrument-checkbox ${isSelected ? 'selected' : ''}" onclick="toggleInstrumentFilter('${inst}', this)">
                    <span class="check-icon"><i class="fas fa-check"></i></span>
                    <span>${inst}</span>
                </div>`;
            }).join('');
            updateSelectedInstrumentsInfo();
        }

        function toggleInstrumentFilter(instrument, el) {
            const idx = selectedInstruments.indexOf(instrument);
            if (idx === -1) { selectedInstruments.push(instrument); el.classList.add('selected'); }
            else { selectedInstruments.splice(idx, 1); el.classList.remove('selected'); }
            updateSelectedInstrumentsInfo();
            applyFilters();
        }

        function updateSelectedInstrumentsInfo() {
            const info = document.getElementById('selectedInstrumentsInfo');
            if (selectedInstruments.length === 0) info.textContent = '';
            else if (selectedInstruments.length === 1) info.textContent = `Showing teachers who teach: ${selectedInstruments[0]}`;
            else info.textContent = `Showing teachers who teach ALL of: ${selectedInstruments.join(', ')}`;
        }

        function populateSelect(id, values, defaultLabel) {
            const select = document.getElementById(id);
            select.innerHTML = `<option value="">${defaultLabel}</option>`;
            values.forEach(v => { const opt = document.createElement('option'); opt.value = v; opt.textContent = v; select.appendChild(opt); });
        }

        function renderZoneTabs() {
            const container = document.getElementById('zoneFilterTabs');
            const zonesWithTeachers = zones.filter(z => teachers.some(t => t.zone && t.zone.id === z.id));
            if (zonesWithTeachers.length === 0) { container.style.display = 'none'; return; }
            let html = `<button class="zone-tab ${activeZone === 'all' ? 'active' : ''}" onclick="filterByZone('all')">All Zones</button>`;
            html += zonesWithTeachers.map(z => `<button class="zone-tab ${activeZone === z.id ? 'active' : ''}" onclick="filterByZone('${z.id}')">${z.zone_name}</button>`).join('');
            container.innerHTML = html;
        }

        function filterByZone(zoneId) {
            activeZone = zoneId;
            renderZoneTabs();
            applyFilters();
        }

        function getActiveFilters() {
            const filters = {};
            const search = document.getElementById('teacherSearch').value.trim();
            if (search) filters.search = search;
            if (activeZone !== 'all') filters.zone = activeZone;
            ['filterState','filterBrand','filterCity','filterLevel','filterGenre','filterAge','filterLanguage','filterComfort','filterSpecialNeeds','filterFormalEd']
                .forEach(id => { const val = document.getElementById(id).value; if (val) filters[id] = val; });
            if (selectedInstruments.length > 0) filters.selectedInstruments = [...selectedInstruments];
            return filters;
        }

        function countActiveFilters(filters) {
            let count = 0;
            if (filters.search) count++;
            if (filters.zone) count++;
            ['filterState','filterBrand','filterCity','filterLevel','filterGenre','filterAge','filterLanguage','filterComfort','filterSpecialNeeds','filterFormalEd']
                .forEach(id => { if (filters[id]) count++; });
            if (filters.selectedInstruments) count += filters.selectedInstruments.length;
            return count;
        }

        function applyFilters() {
            const filters = getActiveFilters();
            const searchLower = (filters.search || '').toLowerCase();
            const levelOrder = { beginner: 1, intermediate: 2, advanced: 3 };

            const filtered = teachers.filter(t => {
                if (searchLower && !`${t.first_name} ${t.last_name}`.toLowerCase().includes(searchLower)) return false;
                if (filters.zone && (!t.zone || t.zone.id !== filters.zone)) return false;
                if (filters.filterState && t.state !== filters.filterState) return false;
                if (filters.filterBrand && t.brand !== filters.filterBrand) return false;
                if (filters.filterCity && !t.cities.some(c => c.city === filters.filterCity)) return false;
                if (filters.filterLanguage && !t.languages.some(l => l.language === filters.filterLanguage)) return false;
                if (filters.selectedInstruments && filters.selectedInstruments.length > 0) {
                    const teacherInsts = t.instruments.map(i => i.instrument);
                    if (!filters.selectedInstruments.every(inst => teacherInsts.includes(inst))) return false;
                }
                if (filters.filterLevel) {
                    const targetLevel = levelOrder[filters.filterLevel] || 0;
                    let rel = t.instruments;
                    if (filters.selectedInstruments?.length > 0) rel = rel.filter(i => filters.selectedInstruments.includes(i.instrument));
                    if (!rel.some(i => (levelOrder[i.teacher_level] || 0) >= targetLevel)) return false;
                }
                if (filters.filterGenre) {
                    let rel = t.instruments;
                    if (filters.selectedInstruments?.length > 0) rel = rel.filter(i => filters.selectedInstruments.includes(i.instrument));
                    if (!rel.some(i => i.genres && i.genres.split(',').map(g => g.trim()).includes(filters.filterGenre))) return false;
                }
                if (filters.filterAge) {
                    const age = parseInt(filters.filterAge);
                    let rel = t.instruments;
                    if (filters.selectedInstruments?.length > 0) rel = rel.filter(i => filters.selectedInstruments.includes(i.instrument));
                    if (!rel.some(i => i.youngest_age_preference && parseInt(i.youngest_age_preference) <= age)) return false;
                }
                if (filters.filterComfort && (!t.learning_needs_comfort || t.learning_needs_comfort < parseInt(filters.filterComfort))) return false;
                if (filters.filterSpecialNeeds === 'yes' && !t.special_needs_willing) return false;
                if (filters.filterFormalEd === 'yes' && !t.formal_music_education) return false;
                return true;
            });

            // Update filter count badge
            const count = countActiveFilters(filters);
            const badge = document.getElementById('filterCountBadge');
            if (count > 0) { badge.textContent = count; badge.classList.add('visible'); }
            else badge.classList.remove('visible');

            // Auto-open more filters if a secondary filter is active
            if (!moreFiltersOpen && ['filterLevel','filterGenre','filterAge','filterLanguage','filterComfort','filterSpecialNeeds','filterFormalEd'].some(id => filters[id])) {
                moreFiltersOpen = true;
                document.getElementById('filterSecondary').classList.add('open');
                document.getElementById('moreFiltersToggle').classList.add('open');
            }

            renderActiveFilterChips(filters);
            renderTeachers(filtered);
        }

        function renderActiveFilterChips(filters) {
            const container = document.getElementById('activeFilters');
            const chips = [];
            const labels = {
                zone: () => { const z = zones.find(z => z.id === filters.zone); return z ? `Zone: ${z.zone_name}` : null; },
                filterState: () => `State: ${filters.filterState}`,
                filterBrand: () => `Brand: ${filters.filterBrand}`,
                filterCity: () => `City: ${filters.filterCity}`,
                filterLevel: () => `Level: ${filters.filterLevel}`,
                filterGenre: () => `Genre: ${filters.filterGenre}`,
                filterAge: () => `Age: ${filters.filterAge}`,
                filterLanguage: () => `Language: ${filters.filterLanguage}`,
                filterComfort: () => `Comfort: ${filters.filterComfort}+`,
                filterSpecialNeeds: () => `Special Needs: Yes`,
                filterFormalEd: () => `Formal Education: Yes`,
            };
            Object.keys(labels).forEach(key => {
                if (filters[key]) {
                    const label = labels[key]();
                    if (label) {
                        const clearAction = key === 'zone' ? `filterByZone('all')` : `clearFilter('${key}')`;
                        chips.push(`<span class="filter-chip">${label}<button onclick="${clearAction}">&times;</button></span>`);
                    }
                }
            });
            if (filters.selectedInstruments) {
                filters.selectedInstruments.forEach(inst => {
                    chips.push(`<span class="filter-chip">Instrument: ${inst}<button onclick="clearInstrumentFilter('${inst}')">&times;</button></span>`);
                });
            }
            if (chips.length > 1) chips.push(`<button class="clear-all-btn" onclick="clearAllFilters()">Clear All</button>`);
            container.innerHTML = chips.join('');
        }

        function clearInstrumentFilter(instrument) {
            const idx = selectedInstruments.indexOf(instrument);
            if (idx !== -1) selectedInstruments.splice(idx, 1);
            renderInstrumentCheckboxes();
            applyFilters();
        }

        function clearFilter(filterId) {
            document.getElementById(filterId).value = '';
            if (filterId === 'filterState') {
                document.getElementById('filterBrand').value = '';
                document.getElementById('filterCity').value = '';
                updateBrandOptions(); updateCityOptions();
            } else if (filterId === 'filterBrand') {
                document.getElementById('filterCity').value = '';
                updateCityOptions();
            }
            applyFilters();
        }

        function clearAllFilters() {
            document.getElementById('teacherSearch').value = '';
            activeZone = 'all';
            renderZoneTabs();
            ['filterState','filterBrand','filterCity','filterLevel','filterGenre','filterAge','filterLanguage','filterComfort','filterSpecialNeeds','filterFormalEd']
                .forEach(id => document.getElementById(id).value = '');
            selectedInstruments = [];
            renderInstrumentCheckboxes();
            updateBrandOptions();
            updateCityOptions();
            applyFilters();
        }

        // ============ HELPERS ============
        function getInitials(first, last) {
            return ((first || '?')[0] + (last || '')[0]).toUpperCase();
        }

        function getYearsAtStudio(yearStarted) {
            if (!yearStarted) return null;
            const years = new Date().getFullYear() - parseInt(yearStarted);
            if (years <= 0) return null;
            return `${years} yr${years !== 1 ? 's' : ''} at studio`;
        }

        // ============ RENDER CARDS ============
        function renderTeachers(teachersList) {
            const container = document.getElementById('teachersGrid');
            document.getElementById('resultsCount').innerHTML = `<strong>${teachersList.length}</strong> teacher${teachersList.length !== 1 ? 's' : ''} found`;

            if (teachersList.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="fas fa-chalkboard-teacher"></i><p>No teachers match your filters</p></div>`;
                return;
            }

            container.innerHTML = teachersList.map(t => {
                const initials = getInitials(t.first_name, t.last_name);
                const avatarHtml = t.photo_url
                    ? `<img src="${t.photo_url}" alt="${t.first_name}">`
                    : initials;

                const instrumentChips = t.instruments.map(i => `
                    <span class="instrument-chip">
                        <span class="level-dot level-${i.teacher_level || 'beginner'}"></span>
                        ${i.instrument}${i.teacher_level ? ` <span style="font-weight:400;opacity:0.7;">(${i.teacher_level})</span>` : ''}
                    </span>`).join('');

                const cityList = t.cities.map(c => c.city).join(', ');
                const languageList = t.languages.map(l => l.language).join(', ');
                const comfortLevel = t.learning_needs_comfort;
                const yearsAtStudio = getYearsAtStudio(t.year_started_at_studio);

                return `
                <div class="teacher-card" onclick="openTeacherDetail('${t.id}')">
                    <div class="teacher-card-header">
                        <div class="card-avatar">${avatarHtml}</div>
                        <div class="card-header-text">
                            <div class="teacher-card-name">${t.first_name} ${t.last_name}</div>
                            <div class="teacher-card-brand">${t.brand || ''}${t.zone ? ' · ' + t.zone.zone_name : ''}</div>
                        </div>
                    </div>
                    <div class="teacher-card-body">
                        ${t.state ? `<div class="teacher-info-row"><i class="fas fa-map-marker-alt"></i><span>${t.state}${cityList ? ' — ' + cityList : ''}</span></div>` : ''}
                        ${yearsAtStudio ? `<div class="teacher-info-row"><i class="fas fa-calendar-alt"></i><span>${yearsAtStudio}</span></div>` : ''}
                        ${languageList ? `<div class="teacher-info-row"><i class="fas fa-language"></i><span>${languageList}</span></div>` : ''}
                        ${comfortLevel ? `
                        <div class="card-comfort-row">
                            <i class="fas fa-heart"></i>
                            <div class="card-comfort-bar-wrap">
                                <div class="card-comfort-bar">
                                    <div class="card-comfort-fill" style="width:${comfortLevel * 10}%"></div>
                                </div>
                            </div>
                            <span class="card-comfort-label">${comfortLevel}/10</span>
                        </div>` : ''}
                        ${t.instruments.length > 0 ? `
                        <div class="teacher-instruments-list">
                            <div class="teacher-instruments-label">Instruments</div>
                            <div class="instrument-chip-row">${instrumentChips}</div>
                        </div>` : ''}
                        <div class="teacher-badges">
                            ${t.formal_music_education ? '<span class="teacher-badge badge-info">Formal Education</span>' : ''}
                            ${t.special_needs_willing ? '<span class="teacher-badge badge-success">Special Needs</span>' : ''}
                            ${comfortLevel && comfortLevel >= 8 ? '<span class="teacher-badge badge-purple">High Learning Needs Comfort</span>' : ''}
                        </div>
                        ${t.bio ? `
                        <button class="card-bio-toggle" onclick="event.stopPropagation(); toggleCardBio(this)">
                            <i class="fas fa-chevron-down"></i> Bio
                        </button>
                        <div class="card-bio-panel">${t.bio.replace(/<[^>]*>/g, '')}</div>
                        ` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        // ============ CARD BIO TOGGLE ============
        function toggleCardBio(btn) {
            btn.classList.toggle('open');
            btn.nextElementSibling.classList.toggle('open');
        }

        // ============ MODAL ============
        function openTeacherDetail(teacherId) {
            const t = teachers.find(x => x.id === teacherId);
            if (!t) return;

            document.getElementById('modalTeacherName').textContent = `${t.first_name} ${t.last_name}`;

            const initials = getInitials(t.first_name, t.last_name);
            const avatarHtml = t.photo_url ? `<img src="${t.photo_url}" alt="${t.first_name}">` : initials;
            const yearsAtStudio = getYearsAtStudio(t.year_started_at_studio);
            const strengths = [t.teaching_strength_1, t.teaching_strength_2, t.teaching_strength_3].filter(Boolean);
            const cityList = t.cities.map(c => c.city).join(', ') || 'N/A';
            const languageList = t.languages.map(l => l.language).join(', ') || 'N/A';
            const comfortLevel = t.learning_needs_comfort || 0;

            let html = `
                <!-- Hero with photo -->
                <div class="modal-hero">
                    <div class="modal-avatar">${avatarHtml}</div>
                    <div class="modal-hero-text">
                        <h2>${t.first_name} ${t.last_name}</h2>
                        <p>${t.brand || ''}${t.zone ? ' · ' + t.zone.zone_name : ''}${yearsAtStudio ? ' · ' + yearsAtStudio : ''}</p>
                    </div>
                </div>
                <div class="modal-inner">`;

            // Bio — at the top if available
            if (t.bio) {
                const bioText = t.bio.replace(/<[^>]*>/g, '');
                html += `<div class="modal-bio">${bioText}</div>`;
            }

            // Comfort bar — high up
            if (comfortLevel > 0) {
                html += `
                    <div class="detail-section">
                        <div class="detail-section-title">Learning Needs</div>
                        <div class="modal-comfort-display">
                            <div class="modal-comfort-bar-wrap">
                                <div class="modal-comfort-bar-label">Comfort with diverse learning needs (ADHD, autism, dyslexia, etc.)</div>
                                <div class="modal-comfort-bar">
                                    <div class="modal-comfort-fill" style="width:${comfortLevel * 10}%"></div>
                                </div>
                            </div>
                            <div class="modal-comfort-value">${comfortLevel}/10</div>
                        </div>
                        ${t.special_needs_willing ? `<div class="special-needs-row"><i class="fas fa-check-circle"></i><span>Willing to teach special needs students</span></div>` : ''}
                    </div>`;
            } else if (t.special_needs_willing) {
                html += `
                    <div class="detail-section">
                        <div class="detail-section-title">Learning Needs</div>
                        <div class="special-needs-row"><i class="fas fa-check-circle"></i><span>Willing to teach special needs students</span></div>
                    </div>`;
            }

            // Overview
            html += `
                <div class="detail-section">
                    <div class="detail-section-title">Overview</div>
                    <div class="detail-grid">
                        <div class="detail-item"><label>Brand</label><p>${t.brand || 'N/A'}</p></div>
                        <div class="detail-item"><label>State</label><p>${t.state || 'N/A'}</p></div>
                        <div class="detail-item"><label>Cities</label><p>${cityList}</p></div>
                        <div class="detail-item"><label>Gender</label><p>${t.gender || 'N/A'}</p></div>
                        <div class="detail-item"><label>Languages</label><p>${languageList}</p></div>
                        <div class="detail-item"><label>Year Started</label><p>${t.year_started_at_studio || 'N/A'}</p></div>
                        ${t.zone ? `<div class="detail-item"><label>Zone</label><p>${t.zone.zone_name}</p></div>` : ''}
                    </div>
                </div>`;

            // Education & Strengths
            if (t.formal_music_education || t.formal_education_details || strengths.length > 0) {
                html += `<div class="detail-section"><div class="detail-section-title">Education & Strengths</div>`;
                if (t.formal_education_details) {
                    html += `<div style="margin-bottom:1rem;font-size:0.9375rem;color:var(--text-primary);line-height:1.6;">${t.formal_education_details}</div>`;
                }
                if (strengths.length > 0) {
                    html += `<div class="strengths-pills">`;
                    html += strengths.map(s => `<span class="strength-pill"><i class="fas fa-check"></i>${s}</span>`).join('');
                    html += `</div>`;
                }
                html += `</div>`;
            }

            // Instruments
            if (t.instruments.length > 0) {
                html += `<div class="detail-section"><div class="detail-section-title">Instruments</div>`;
                html += t.instruments.map(i => `
                    <div class="detail-instrument-card">
                        <div class="detail-instrument-name">
                            <span class="level-dot level-${i.teacher_level || 'beginner'}" style="width:9px;height:9px;"></span>
                            ${i.instrument}${i.teacher_level ? ` <span style="font-weight:500;font-size:0.875rem;color:var(--text-secondary);">(${i.teacher_level})</span>` : ''}
                        </div>
                        <div class="detail-instrument-grid">
                            <div class="detail-item"><label>Highest Teaching Level</label><p>${i.teacher_level || 'N/A'}</p></div>
                            <div class="detail-item"><label>Youngest Age</label><p>${i.youngest_age_preference ? i.youngest_age_preference + '+' : 'N/A'}</p></div>
                            <div class="detail-item"><label>Year Started Teaching</label><p>${i.year_started || 'N/A'}</p></div>
                            <div class="detail-item"><label>Genres</label><p>${i.genres || 'N/A'}</p></div>
                            ${i.achievements_credentials ? `<div class="detail-item" style="grid-column:1/-1;"><label>Certifications & Experience</label><p>${i.achievements_credentials}</p></div>` : ''}
                            ${i.notes ? `<div class="detail-item" style="grid-column:1/-1;"><label>Notes</label><div style="font-size:0.875rem;color:var(--text-secondary);line-height:1.5;">${i.notes}</div></div>` : ''}
                        </div>
                    </div>`).join('');
                html += `</div>`;
            }

            // Additional notes
            if (t.additional_notes) {
                html += `
                    <div class="detail-section">
                        <div class="detail-section-title">Additional Notes</div>
                        <div style="font-size:0.9375rem;color:var(--text-primary);line-height:1.6;">${t.additional_notes}</div>
                    </div>`;
            }

            html += `</div>`; // close modal-inner

            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('teacherModal').classList.add('active');
        }

        function closeModal() { document.getElementById('teacherModal').classList.remove('active'); }
        document.addEventListener('click', e => { if (e.target.id === 'teacherModal') closeModal(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    </script>
</body>
</html>
