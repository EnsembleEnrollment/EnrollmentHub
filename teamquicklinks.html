<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Links - Enrollment Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #FA8072;
            --primary-light: #FFB4A2;
            --primary-dark: #E96E5D;
            --secondary: #FF6B9D;
            --secondary-light: #FFB6C1;
            --accent: #FFA07A;
            --accent-light: #FFCBA4;

            --bg-primary: #FFFFFF;
            --bg-secondary: #F8F9FA;
            --text-primary: #2D3748;
            --text-secondary: #718096;
            --text-light: #A0AEC0;
            --white: #FFFFFF;

            --gray-50: #F8F9FA;
            --gray-100: #F1F3F5;
            --gray-200: #E9ECEF;
            --gray-300: #DEE2E6;

            --shadow-sm: 0 2px 4px 0 rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px 0 rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 30px 0 rgba(0,0,0,0.12);

            --sidebar-width: 260px;
            --sidebar-collapsed: 70px;
            --transition-speed: 0.3s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F8F9FA;
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            position: fixed; top: 0; left: 0;
            width: var(--sidebar-width); height: 100vh;
            background: var(--white);
            border-right: 1px solid var(--gray-200);
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition-speed) ease, width var(--transition-speed) ease;
            z-index: 1000; display: flex; flex-direction: column;
        }
        .sidebar.collapsed { width: var(--sidebar-collapsed); }
        .sidebar-header {
            padding: 1.5rem 1.25rem; display: flex;
            align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--gray-200);
        }
        .logo-section { display: flex; align-items: center; gap: 0.75rem; transition: opacity var(--transition-speed) ease; }
        .sidebar.collapsed .logo-section { opacity: 0; pointer-events: none; }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0; color: var(--white); font-weight: 700;
        }
        .logo-text { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); white-space: nowrap; }
        .toggle-btn {
            width: 32px; height: 32px; border: 1px solid var(--gray-200);
            background: var(--white); color: var(--text-secondary); border-radius: 6px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; flex-shrink: 0;
        }
        .toggle-btn:hover { background: var(--gray-50); border-color: var(--gray-300); }
        .sidebar.collapsed .toggle-icon { transform: rotate(180deg); }
        .toggle-icon { transition: transform var(--transition-speed) ease; font-size: 1rem; }
        .sidebar-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 1rem 0; }
        .nav-item {
            display: flex; align-items: center; gap: 0.875rem;
            padding: 0.875rem 1.5rem; margin: 0.25rem 0.75rem;
            color: var(--text-secondary); text-decoration: none;
            border-radius: 10px; transition: all 0.2s ease;
            cursor: pointer; border: none; background: transparent;
            width: calc(100% - 1.5rem); font-size: 0.9375rem; font-weight: 500;
        }
        .nav-item:hover { background: var(--gray-100); color: var(--text-primary); }
        .nav-item.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: var(--white); box-shadow: 0 4px 12px rgba(250,128,114,0.3);
        }
        .nav-icon { font-size: 1.25rem; flex-shrink: 0; width: 20px; }
        .nav-text { white-space: nowrap; transition: opacity var(--transition-speed) ease; }
        .sidebar.collapsed .nav-text { opacity: 0; pointer-events: none; }
        .sidebar.collapsed .nav-item { justify-content: center; padding: 0.875rem; }
        .sidebar-footer { padding: 0.5rem 0 1rem 0; border-top: 1px solid var(--gray-200); }
        .logout-btn { color: var(--secondary) !important; }
        .logout-btn:hover { background: rgba(255,107,157,0.1) !important; }
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 999; opacity: 0;
            pointer-events: none; transition: opacity var(--transition-speed) ease;
        }
        .sidebar-overlay.active { opacity: 1; pointer-events: all; }

        /* ── MAIN ── */
        .main-content {
            margin-left: var(--sidebar-width); min-height: 100vh;
            padding: 2rem 2.5rem; transition: margin-left var(--transition-speed) ease;
        }
        .sidebar.collapsed ~ .main-content { margin-left: var(--sidebar-collapsed); }

        .page-header { margin-bottom: 2rem; }
        .page-header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.25rem; }
        .page-header p { color: var(--text-secondary); }

        /* ── BRANDS SECTION ── */
        .studio-section {
            background: var(--white); border-radius: 16px;
            padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow-md);
        }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
        .section-title { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 0.625rem; }
        .section-title i { color: var(--primary); }

        /* ── SMART SEARCH ── */
        .smart-search-wrap {
            position: relative;
            margin-bottom: 1rem;
        }
        .smart-search-wrap > i.fa-search {
            position: absolute; left: 0.875rem; top: 1.25rem; transform: translateY(-50%);
            color: var(--primary); font-size: 0.875rem; pointer-events: none;
        }
        .smart-search-input {
            width: 100%; padding: 0.75rem 2.5rem 0.75rem 2.75rem;
            background: var(--gray-50); border: 1.5px solid var(--gray-200);
            border-radius: 10px; font-size: 0.9375rem; color: var(--text-primary);
            transition: all 0.2s ease;
        }
        .smart-search-input:focus {
            outline: none; border-color: var(--primary); background: var(--white);
            box-shadow: 0 0 0 3px rgba(250,128,114,0.1);
        }
        .smart-search-clear {
            position: absolute; right: 0.625rem; top: 1.25rem; transform: translateY(-50%);
            width: 22px; height: 22px; border: none; background: var(--gray-200);
            color: var(--text-secondary); border-radius: 50%; cursor: pointer;
            display: none; align-items: center; justify-content: center;
            font-size: 0.625rem; transition: all 0.15s;
        }
        .smart-search-clear:hover { background: var(--gray-300); color: var(--text-primary); }
        .smart-search-clear.visible { display: flex; }

        .search-dropdown {
            position: relative;
            margin-top: 0.5rem;
            background: white; border: 1px solid var(--gray-200); border-radius: 10px;
            box-shadow: var(--shadow-md); z-index: 500;
            max-height: 360px; overflow-y: auto; display: none;
        }
        .search-dropdown.active { display: block; }
        .search-dropdown-section { padding: 0.5rem 0; border-bottom: 1px solid var(--gray-100); }
        .search-dropdown-section:last-child { border-bottom: none; }
        .search-dropdown-label {
            font-size: 0.6875rem; font-weight: 700; color: var(--text-light);
            text-transform: uppercase; letter-spacing: 0.05em;
            padding: 0.25rem 0.875rem 0.5rem;
        }
        .search-dropdown-item {
            display: flex; align-items: center; gap: 0.625rem;
            padding: 0.5rem 0.875rem; cursor: pointer; transition: background 0.15s;
            font-size: 0.875rem; color: var(--text-primary);
        }
        .search-dropdown-item:hover, .search-dropdown-item.active-suggestion {
            background: rgba(250, 128, 114, 0.08); color: var(--primary-dark);
        }
        .search-dropdown-item i {
            color: var(--primary); width: 14px; font-size: 0.75rem; flex-shrink: 0;
        }
        .search-dropdown-item .item-meta {
            margin-left: auto; font-size: 0.75rem; color: var(--text-light);
        }
        .search-dropdown-item .match { font-weight: 700; color: var(--primary-dark); }
        .search-dropdown-empty {
            padding: 1rem; text-align: center; color: var(--text-light); font-size: 0.875rem;
        }

        .zone-filter-tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
        .zone-tab {
            padding: 0.5rem 1rem; font-size: 0.8125rem; font-weight: 600;
            color: var(--text-secondary); background: var(--gray-50);
            border: 1.5px solid var(--gray-200); border-radius: 20px; cursor: pointer; transition: all 0.2s ease;
        }
        .zone-tab:hover { border-color: var(--primary); color: var(--primary); }
        .zone-tab.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white; border-color: transparent; box-shadow: 0 2px 8px rgba(250,128,114,0.3);
        }

        /* ── BRAND CARDS ── */
        .studios-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .brand-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-left: 4px solid var(--primary);
            border-radius: 10px;
            box-shadow: var(--shadow-sm);
            padding: 1rem 1.25rem 1rem;
            display: flex;
            flex-direction: column;
            transition: all 0.2s ease;
        }
        .brand-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

        .brand-card-header {
            display: flex; align-items: flex-start; justify-content: space-between;
            gap: 0.5rem; margin-bottom: 0.75rem;
        }
        .brand-name { font-size: 1rem; font-weight: 700; color: var(--text-primary); line-height: 1.3; }
        .brand-badges { display: flex; flex-wrap: wrap; gap: 0.3rem; flex-shrink: 0; justify-content: flex-end; }
        .brand-state-badge {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white; font-size: 0.625rem; font-weight: 700;
            padding: 0.25rem 0.625rem; border-radius: 10px; text-transform: uppercase;
            white-space: nowrap;
        }
        .brand-zone-badge {
            background: rgba(250, 128, 114, 0.1);
            color: var(--primary-dark); font-size: 0.625rem; font-weight: 700;
            padding: 0.25rem 0.625rem; border-radius: 10px; text-transform: uppercase;
            border: 1px solid rgba(250, 128, 114, 0.2);
            white-space: nowrap;
        }

        .brand-info-row {
            display: flex; flex-direction: column; gap: 0.5rem;
            padding-top: 0.75rem; border-top: 1px solid var(--gray-100); flex: 1;
        }
        .brand-info-items { display: flex; flex-wrap: wrap; gap: 0.75rem; }
        .brand-info-item { display: flex; align-items: center; gap: 0.375rem; font-size: 0.8125rem; }
        .brand-info-item i { color: var(--primary); font-size: 0.75rem; width: 14px; }
        .brand-info-item span { color: var(--text-secondary); font-weight: 500; }

        /* ── REBALANCED BUTTON FOOTER ── */
        .brand-card-actions {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 0.875rem;
            border-top: 1px solid var(--gray-100);
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.5rem 0.625rem;
            border-radius: 8px;
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        /* Primary action — Info opens the full studio modal */
        .action-btn.info {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            box-shadow: 0 2px 6px rgba(250,128,114,0.25);
        }
        .action-btn.info:hover {
            box-shadow: 0 4px 12px rgba(250,128,114,0.4);
            transform: translateY(-1px);
        }

        /* Secondary actions — sit beside each other under primary */
        .action-row-secondary {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.4rem;
        }

        .action-btn.secondary {
            background: var(--gray-50);
            border: 1.5px solid var(--gray-200);
            color: var(--text-primary);
            font-size: 0.75rem;
            padding: 0.4rem 0.5rem;
        }
        .action-btn.secondary:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(250,128,114,0.05);
        }
        .action-btn.secondary.disabled {
            color: var(--text-light);
            cursor: not-allowed;
            pointer-events: none;
            opacity: 0.6;
        }

        /* ── TABS / LINKS ── */
        .tabs-section { background: var(--white); border-radius: 16px; padding: 1.5rem; box-shadow: var(--shadow-md); margin-bottom: 1.5rem; }
        .tabs { display: flex; gap: 0.5rem; border-bottom: 2px solid var(--gray-200); margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tab {
            padding: 0.75rem 1.25rem; background: transparent; border: none;
            border-bottom: 3px solid transparent; color: var(--text-secondary);
            font-size: 0.9375rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s ease; margin-bottom: -2px;
        }
        .tab:hover { color: var(--text-primary); }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 0.875rem; }
        .link-card {
            background: var(--white); border: 1px solid var(--gray-200); border-radius: 12px;
            padding: 1rem; text-decoration: none; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; box-shadow: var(--shadow-sm);
        }
        .link-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--primary); }
        .link-content { flex: 1; min-width: 0; }
        .link-title { font-size: 0.9375rem; font-weight: 600; color: var(--text-primary); margin-bottom: 0.25rem; }
        .link-subtitle { font-size: 0.8125rem; color: var(--text-secondary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .link-arrow { color: var(--primary); font-size: 1rem; opacity: 0.6; transition: all 0.2s ease; flex-shrink: 0; }
        .link-card:hover .link-arrow { opacity: 1; transform: translateX(4px); }

        /* ── STUDIO PICKER MODAL ── */
        .picker-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 1.5rem;
        }
        .picker-overlay.active { opacity: 1; pointer-events: all; }

        .picker-modal {
            background: var(--white); border-radius: 20px; width: 100%; max-width: 680px;
            max-height: 80vh; display: flex; flex-direction: column;
            transform: translateY(24px) scale(0.96); transition: transform 0.3s ease; overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        .picker-overlay.active .picker-modal { transform: translateY(0) scale(1); }

        .picker-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            padding: 1.25rem 1.5rem; color: white; flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between; gap: 1rem;
        }
        .picker-header-title { font-size: 1.125rem; font-weight: 700; }
        .picker-header-sub { font-size: 0.8125rem; opacity: 0.85; margin-top: 0.125rem; }
        .picker-close {
            width: 32px; height: 32px; border: none; background: rgba(255,255,255,0.2);
            color: white; border-radius: 50%; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
            transition: all 0.2s ease;
        }
        .picker-close:hover { background: rgba(255,255,255,0.35); transform: rotate(90deg); }

        .picker-search-wrap {
            padding: 1rem 1.25rem 0.75rem; border-bottom: 1px solid var(--gray-200);
            flex-shrink: 0; position: relative;
        }
        .picker-search {
            width: 100%; padding: 0.625rem 1rem 0.625rem 2.5rem;
            background: var(--gray-50); border: 1.5px solid var(--gray-200);
            border-radius: 10px; font-size: 0.9375rem; color: var(--text-primary);
            transition: all 0.2s ease;
        }
        .picker-search:focus { outline: none; border-color: var(--primary); background: var(--white); box-shadow: 0 0 0 3px rgba(250,128,114,0.1); }
        .picker-search-icon {
            position: absolute; left: 2.125rem; top: 50%; transform: translateY(-50%);
            color: var(--primary); font-size: 0.875rem; pointer-events: none;
        }

        .picker-body {
            padding: 1rem 1.25rem 1.25rem;
            overflow-y: auto; flex: 1;
        }
        .picker-body::-webkit-scrollbar { width: 4px; }
        .picker-body::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 2px; }

        .picker-count {
            font-size: 0.75rem; font-weight: 600; color: var(--text-light);
            text-transform: uppercase; letter-spacing: 0.04em;
            margin-bottom: 0.75rem;
        }

        .picker-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.625rem;
        }

        .picker-studio-btn {
            display: flex; flex-direction: column;
            padding: 0.875rem 1rem; background: var(--gray-50);
            border: 1.5px solid var(--gray-200); border-radius: 12px;
            cursor: pointer; transition: all 0.2s ease; text-align: left;
            position: relative;
        }
        .picker-studio-btn:hover {
            border-color: var(--primary); background: rgba(250,128,114,0.04);
            transform: translateY(-2px); box-shadow: var(--shadow-md);
        }

        .picker-city {
            font-size: 1.0625rem; font-weight: 700; color: var(--text-primary); line-height: 1.2;
        }
        .picker-state {
            font-size: 0.75rem; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.04em; margin-top: 0.2rem;
        }
        .picker-address {
            font-size: 0.75rem; color: var(--text-light); margin-top: 0.375rem; line-height: 1.4;
        }
        .picker-arrow {
            position: absolute; bottom: 0.75rem; right: 0.875rem;
            color: var(--primary); opacity: 0; transition: all 0.2s ease; font-size: 0.75rem;
        }
        .picker-studio-btn:hover .picker-arrow { opacity: 1; transform: translateX(2px); }

        .picker-empty {
            text-align: center; padding: 2rem 1rem;
            color: var(--text-light); font-size: 0.9375rem; grid-column: span 2;
        }
        .picker-empty i { font-size: 2rem; display: block; margin-bottom: 0.5rem; color: var(--gray-300); }

        @media (max-width: 500px) {
            .picker-grid { grid-template-columns: 1fr; }
            .picker-empty { grid-column: span 1; }
        }

        /* ── STUDIO DETAIL MODAL (full screen, sidebar + scrollable content) ── */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-secondary);
            z-index: 3000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.25s ease;
            overflow: hidden;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }

        .modal {
            background: var(--white); width: 100%; height: 100%;
            transform: translateY(30px); transition: transform 0.3s ease;
            display: flex; flex-direction: column; border-radius: 0;
        }
        .modal-overlay.active .modal { transform: translateY(0); }

        .modal-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            padding: 1.25rem 5rem 1.25rem 1.5rem;
            color: white; position: relative; overflow: hidden; flex-shrink: 0;
        }
        .modal-header::before {
            content: ''; position: absolute; top: -50%; right: -50%; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%); pointer-events: none;
        }
        .modal-header-content { position: relative; z-index: 1; }
        .modal-header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.375rem; gap: 1rem; }
        .modal-title { font-size: 1.5rem; font-weight: 700; line-height: 1.3; }
        .modal-zone-badge {
            background: rgba(255,255,255,0.25); padding: 0.375rem 0.875rem; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
            white-space: nowrap; flex-shrink: 0;
        }
        .modal-location { font-size: 0.9375rem; opacity: 0.9; display: flex; align-items: center; gap: 0.375rem; }

        .modal-close {
            position: absolute; top: 50%; right: 1.25rem; transform: translateY(-50%);
            display: flex; align-items: center; gap: 0.5rem;
            background: rgba(255,255,255,0.2); color: white;
            border: 1.5px solid rgba(255,255,255,0.4);
            border-radius: 10px; padding: 0.5rem 1rem;
            cursor: pointer; font-size: 0.9375rem; font-weight: 600;
            transition: all 0.2s ease; z-index: 2; white-space: nowrap;
        }
        .modal-close:hover { background: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.7); }
        .modal-close i { font-size: 0.875rem; }

        /* Sticky search bar */
        .modal-search-bar {
            padding: 0.875rem 1.5rem;
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            flex-shrink: 0;
            position: relative;
        }
        .modal-search-wrap {
            position: relative;
            max-width: 720px;
            margin: 0 auto;
        }
        .modal-search-wrap > i.fa-search {
            position: absolute; left: 0.875rem; top: 50%; transform: translateY(-50%);
            color: var(--primary); font-size: 0.875rem; pointer-events: none;
        }
        .modal-search-input {
            width: 100%; padding: 0.625rem 2.5rem 0.625rem 2.625rem;
            background: var(--gray-50); border: 1.5px solid var(--gray-200);

<script>
const SUPABASE_URL = 'https://kvyvjwepfrqqkvyyutdw.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt2eXZqd2VwZnJxcWt2eXl1dGR3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcyMjgyOTgsImV4cCI6MjA4MjgwNDI5OH0.ZayLxzQCEFENvQ9FwpLm4x2le2Y9kJvSslX8DVRzAh8';

let sb;
let allBrands = [], allZones = [], allStudios = [], categories = [], links = [];
let activeZone = 'all', activeCategory = null;

// Enriched studio data
let studioInstruments = [], studioLinks = [], studioAdmins = [];
let studioScholarships = [], studioNotes = [], studioPolicies = [], studioDiscounts = [];

// Smart search state
let activeSuggestionIndex = -1;
let currentSuggestions = [];

document.addEventListener('DOMContentLoaded', () => {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const saved = localStorage.getItem('teamQuickLinksZone');
    if (saved) activeZone = saved;
    setupSidebar();
    loadData();
});

function setupSidebar() {
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebarToggle');
    const overlay = document.getElementById('sidebarOverlay');

    toggleBtn.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        if (window.innerWidth <= 768 && !sidebar.classList.contains('collapsed')) {
            overlay.classList.add('active');
        } else {
            overlay.classList.remove('active');
        }
    });
    overlay.addEventListener('click', () => {
        sidebar.classList.add('collapsed');
        overlay.classList.remove('active');
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
        if (confirm('Are you sure you want to logout?')) window.location.href = 'index.html';
    });
}

async function loadData() {
    try {
        const [
            brandsRes, zonesRes, studiosRes, catRes, linksRes,
            instrRes, slinkRes, adminsRes, scholRes, notesRes, policiesRes, discountsRes
        ] = await Promise.all([
            sb.from('brands').select('*'),
            sb.from('zones').select('*'),
            sb.from('studios').select('*').order('city'),
            sb.from('categories').select('*').order('order_index'),
            sb.from('quick_links').select('*').order('order_index'),
            sb.from('studio_instruments').select('*').order('order_index'),
            sb.from('studio_links').select('*').order('order_index'),
            sb.from('studio_admins').select('*').order('order_index'),
            sb.from('studio_scholarships').select('*').order('order_index'),
            sb.from('studio_notes').select('*').order('order_index'),
            sb.from('studio_policies').select('*').order('order_index'),
            sb.from('studio_discounts').select('*').order('order_index')
        ]);

        allZones = zonesRes.data || [];
        allBrands = (brandsRes.data || []).map(b => ({
            ...b,
            zone: allZones.find(z => z.id === b.zone_id)
        }));

        studioInstruments  = instrRes.data    || [];
        studioLinks        = slinkRes.data    || [];
        studioAdmins       = adminsRes.data   || [];
        studioScholarships = scholRes.data    || [];
        studioNotes        = notesRes.data    || [];
        studioPolicies     = policiesRes.data || [];
        studioDiscounts    = discountsRes.data|| [];

        allStudios = (studiosRes.data || []).map(s => {
            const brand = allBrands.find(b => b.id === s.brand_id);
            const zone  = brand ? allZones.find(z => z.id === brand.zone_id) : null;
            return {
                ...s,
                brand,
                zone: zone ? `Zone ${zone.zone_number}` : null,
                instruments:    studioInstruments.filter(i => i.studio_id === s.id),
                custom_links:   studioLinks.filter(l => l.studio_id === s.id),
                admins:         studioAdmins.filter(a => a.studio_id === s.id),
                scholarships:   studioScholarships.filter(x => x.studio_id === s.id),
                studio_notes:   studioNotes.filter(n => n.studio_id === s.id),
                policies:       studioPolicies.filter(p => p.studio_id === s.id),
                discounts:      studioDiscounts.filter(d => d.studio_id === s.id)
            };
        });

        categories = catRes.data || [];
        links      = linksRes.data || [];

        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';

        if (categories.length > 0) activeCategory = categories[0].id;

        renderZoneFilterTabs();
        renderBrands();
        renderTabs();
        renderTabContents();

        // Smart search wiring
        const brandSearch = document.getElementById('brandSearch');
        brandSearch.addEventListener('input', onSearchInput);
        brandSearch.addEventListener('keydown', onSearchKeydown);
        brandSearch.addEventListener('focus', () => {
            if (brandSearch.value.trim()) renderSearchDropdown(brandSearch.value);
        });
        document.addEventListener('click', e => {
            if (!e.target.closest('.smart-search-wrap')) closeSearchDropdown();
        });

        // Modal search wiring (debounced — re-rendering the modal on each keystroke is expensive)
        const modalSearch = document.getElementById('modalSearch');
        let modalSearchTimer = null;
        modalSearch.addEventListener('input', e => {
            clearTimeout(modalSearchTimer);
            modalSearchTimer = setTimeout(() => onModalSearchInput(e), 150);
            // Update the clear button immediately for responsiveness
            document.getElementById('modalSearchClear').classList.toggle('visible', e.target.value.length > 0);
        });

        // Close modals on overlay click
        document.getElementById('studioModal').addEventListener('click', e => { if (e.target.id === 'studioModal') closeModal(); });
        document.getElementById('pickerOverlay').addEventListener('click', e => { if (e.target.id === 'pickerOverlay') closePicker(); });
        document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closePicker(); closeSearchDropdown(); } });

    } catch(err) {
        console.error(err);
        document.getElementById('loading').innerHTML = '<p style="color:red;">Error loading data. Please refresh.</p>';
    }
}

/* ── ZONE TABS ── */
function renderZoneFilterTabs() {
    const container = document.getElementById('zoneFilterTabs');
    const zonesWithBrands = allZones.filter(z => allBrands.some(b => b.zone_id === z.id));
    let html = `<button class="zone-tab ${activeZone==='all'?'active':''}" onclick="filterByZone('all')">All Zones</button>`;
    html += zonesWithBrands.map(z => `
        <button class="zone-tab ${activeZone===z.id?'active':''}" onclick="filterByZone('${z.id}')">${z.zone_name}</button>
    `).join('');
    container.innerHTML = html;
}

function filterByZone(zoneId) {
    activeZone = zoneId;
    localStorage.setItem('teamQuickLinksZone', zoneId);
    renderZoneFilterTabs();
    renderBrands();
}

/* ── SMART SEARCH ── */
function onSearchInput(e) {
    const q = e.target.value;
    document.getElementById('brandSearchClear').classList.toggle('visible', q.length > 0);
    if (q.trim().length > 0) renderSearchDropdown(q);
    else closeSearchDropdown();
    renderBrands();
}

function onSearchKeydown(e) {
    const dropdown = document.getElementById('searchDropdown');
    if (!dropdown.classList.contains('active')) return;
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeSuggestionIndex = Math.min(activeSuggestionIndex + 1, currentSuggestions.length - 1);
        updateActiveSuggestion();
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeSuggestionIndex = Math.max(activeSuggestionIndex - 1, -1);
        updateActiveSuggestion();
    } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeSuggestionIndex >= 0 && currentSuggestions[activeSuggestionIndex]) {
            const s = currentSuggestions[activeSuggestionIndex];
            applySuggestion(s.type, s.value);
        }
    } else if (e.key === 'Escape') {
        closeSearchDropdown();
    }
}

function updateActiveSuggestion() {
    document.querySelectorAll('.search-dropdown-item').forEach((el, i) => {
        el.classList.toggle('active-suggestion', i === activeSuggestionIndex);
    });
}

function clearBrandSearch() {
    document.getElementById('brandSearch').value = '';
    document.getElementById('brandSearchClear').classList.remove('visible');
    closeSearchDropdown();
    renderBrands();
}

function closeSearchDropdown() {
    document.getElementById('searchDropdown').classList.remove('active');
    activeSuggestionIndex = -1;
    currentSuggestions = [];
}

function highlightMatch(text, query) {
    if (!query) return text;
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return text;
    return text.substring(0, idx) +
           `<span class="match">${text.substring(idx, idx + query.length)}</span>` +
           text.substring(idx + query.length);
}

function renderSearchDropdown(query) {
    const q = query.trim().toLowerCase();
    const dropdown = document.getElementById('searchDropdown');
    if (!q) { closeSearchDropdown(); return; }

    const sections = [];
    const MAX_PER_SECTION = 5;

    // Brands by name, price, annual fee
    const matchedBrands = allBrands
        .filter(b =>
            (b.name||'').toLowerCase().includes(q) ||
            (b.display_price||'').toLowerCase().includes(q) ||
            (b.display_annual_fee||'').toLowerCase().includes(q) ||
            (b.phone_number||'').toLowerCase().includes(q)
        )
        .slice(0, MAX_PER_SECTION)
        .map(b => ({
            type: 'brand',
            value: b.id,
            label: b.name || 'Unnamed brand',
            meta: [b.state, b.zone?.zone_name].filter(Boolean).join(' · ')
        }));
    if (matchedBrands.length) sections.push({ label: 'Brands', icon: 'fa-building', items: matchedBrands });

    // States
    const allStates = [...new Set(allBrands.map(b => b.state).filter(Boolean))];
    const matchedStates = allStates
        .filter(s => s.toLowerCase().includes(q)).sort()
        .slice(0, MAX_PER_SECTION)
        .map(s => ({ type: 'state', value: s, label: s, meta: '' }));
    if (matchedStates.length) sections.push({ label: 'States', icon: 'fa-flag-usa', items: matchedStates });

    // Cities (from studios)
    const cityMap = new Map(); // city -> brand_id of first match
    allStudios.forEach(st => {
        if (st.city && !cityMap.has(st.city) && st.city.toLowerCase().includes(q)) {
            cityMap.set(st.city, st.brand_id);
        }
    });
    const matchedCities = [...cityMap.entries()]
        .sort((a, b) => a[0].localeCompare(b[0]))
        .slice(0, MAX_PER_SECTION)
        .map(([city, brandId]) => {
            const brand = allBrands.find(b => b.id === brandId);
            return { type: 'city', value: city, label: city, meta: brand ? brand.name : '' };
        });
    if (matchedCities.length) sections.push({ label: 'Cities', icon: 'fa-city', items: matchedCities });

    // Zones
    const matchedZones = allZones
        .filter(z => (z.zone_name||'').toLowerCase().includes(q))
        .slice(0, MAX_PER_SECTION)
        .map(z => ({ type: 'zone', value: z.id, label: z.zone_name, meta: '' }));
    if (matchedZones.length) sections.push({ label: 'Zones', icon: 'fa-layer-group', items: matchedZones });

    currentSuggestions = sections.flatMap(s => s.items);
    activeSuggestionIndex = -1;

    if (sections.length === 0) {
        dropdown.innerHTML = `<div class="search-dropdown-empty">No matches for "${query}"</div>`;
    } else {
        dropdown.innerHTML = sections.map(s => `
            <div class="search-dropdown-section">
                <div class="search-dropdown-label">${s.label}</div>
                ${s.items.map(item => `
                    <div class="search-dropdown-item" onclick="applySuggestion('${item.type}', ${JSON.stringify(item.value).replace(/"/g, '&quot;')})">
                        <i class="fas ${s.icon}"></i>
                        <span>${highlightMatch(item.label, query)}</span>
                        ${item.meta ? `<span class="item-meta">${item.meta}</span>` : ''}
                    </div>
                `).join('')}
            </div>
        `).join('');
    }
    dropdown.classList.add('active');
}

function applySuggestion(type, value) {
    closeSearchDropdown();
    document.getElementById('brandSearch').value = '';
    document.getElementById('brandSearchClear').classList.remove('visible');

    switch (type) {
        case 'brand':
            // Open the studio modal directly for that brand
            handleInfoClick(value);
            break;
        case 'state':
            // Use the state in the search to filter brands
            document.getElementById('brandSearch').value = value;
            document.getElementById('brandSearchClear').classList.add('visible');
            break;
        case 'city':
            document.getElementById('brandSearch').value = value;
            document.getElementById('brandSearchClear').classList.add('visible');
            break;
        case 'zone':
            filterByZone(value);
            break;
    }
    renderBrands();
}

/* ── BRAND CARDS ── */
function renderBrands() {
    const container = document.getElementById('brandsGrid');
    const q = (document.getElementById('brandSearch')?.value || '').toLowerCase().trim();

    let filtered = allBrands;
    if (activeZone !== 'all') filtered = filtered.filter(b => b.zone_id === activeZone);

    // Multi-field smart filter: name, state, price, annual fee, phone, zone, plus studio cities
    if (q) {
        filtered = filtered.filter(b => {
            const studiosOfBrand = allStudios.filter(s => s.brand_id === b.id);
            const haystack = [
                b.name || '',
                b.state || '',
                b.display_price || '',
                b.display_annual_fee || '',
                b.phone_number || '',
                b.zone?.zone_name || '',
                ...studiosOfBrand.map(s => s.city || ''),
                ...studiosOfBrand.map(s => s.address || ''),
            ].join(' ').toLowerCase();
            return haystack.includes(q);
        });
    }

    if (!filtered.length) {
        container.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;"><i class="fas fa-building"></i><p>No brands found</p></div>';
        return;
    }

    container.innerHTML = filtered.map(brand => {
        const hasSchedule = brand.scheduling_link && brand.scheduling_link.trim();
        const scheduleBtn = hasSchedule
            ? `<a href="${brand.scheduling_link}" target="_blank" class="action-btn secondary" title="Schedule"><i class="fas fa-calendar"></i> Schedule</a>`
            : `<span class="action-btn secondary disabled" title="No schedule link"><i class="fas fa-calendar"></i> Schedule</span>`;

        const badges = [];
        if (brand.zone?.zone_name) badges.push(`<span class="brand-zone-badge">${brand.zone.zone_name}</span>`);
        if (brand.state) badges.push(`<span class="brand-state-badge">${brand.state}</span>`);

        return `
            <div class="brand-card">
                <div class="brand-card-header">
                    <div class="brand-name">${brand.name || 'Unnamed Brand'}</div>
                    <div class="brand-badges">${badges.join('')}</div>
                </div>
                <div class="brand-info-row">
                    <div class="brand-info-items">
                        <div class="brand-info-item"><i class="fas fa-phone"></i><span>${brand.phone_number || 'N/A'}</span></div>
                        <div class="brand-info-item"><i class="fas fa-dollar-sign"></i><span>${brand.display_price || 'Contact for pricing'}</span></div>
                        <div class="brand-info-item"><i class="fas fa-calendar-check"></i><span>${brand.display_annual_fee || 'N/A'}</span></div>
                    </div>
                </div>
                <div class="brand-card-actions">
                    <button class="action-btn info" onclick="handleInfoClick('${brand.id}')"><i class="fas fa-info-circle"></i> View Info</button>
                    <div class="action-row-secondary">
                        ${scheduleBtn}
                        <a href="teamteachers.html?brand=${encodeURIComponent(brand.name || '')}" class="action-btn secondary"><i class="fas fa-star"></i> Teachers</a>
                        <a href="teamprograms.html?brand_id=${encodeURIComponent(brand.id || '')}" class="action-btn secondary"><i class="fas fa-graduation-cap"></i> Programs</a>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

/* ── INFO BUTTON HANDLER ── */
function handleInfoClick(brandId) {
    const studios = allStudios.filter(s => s.brand_id === brandId);
    if (!studios.length) {
        alert('No studio information found for this brand.');
        return;
    }
    if (studios.length === 1) {
        openStudioModal(studios[0]);
    } else {
        openPicker(brandId, studios);
    }
}

/* ── PICKER MODAL ── */
let pickerStudios = [];

function openPicker(brandId, studios) {
    const brand = allBrands.find(b => b.id === brandId);
    pickerStudios = studios;

    document.getElementById('pickerTitle').textContent = brand?.name || 'Select a Studio';
    document.getElementById('pickerSub').textContent = `${studios.length} locations — pick one to view details`;
    document.getElementById('pickerSearch').value = '';

    renderPickerGrid(studios);

    document.getElementById('pickerSearch').oninput = function() {
        const q = this.value.toLowerCase().trim();
        const filtered = q
            ? pickerStudios.filter(s =>
                (s.city||'').toLowerCase().includes(q) ||
                (s.state||'').toLowerCase().includes(q) ||
                (s.address||'').toLowerCase().includes(q)
              )
            : pickerStudios;
        renderPickerGrid(filtered);
    };

    document.getElementById('pickerOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    setTimeout(() => document.getElementById('pickerSearch').focus(), 300);
}

function renderPickerGrid(studios) {
    const countEl = document.getElementById('pickerCount');
    const gridEl  = document.getElementById('pickerBody');

    countEl.textContent = `${studios.length} location${studios.length !== 1 ? 's' : ''}`;

    if (!studios.length) {
        gridEl.innerHTML = `
            <div class="picker-empty">
                <i class="fas fa-map-marker-alt"></i>
                No locations match your search
            </div>`;
        return;
    }

    gridEl.innerHTML = studios.map(s => {
        const city    = s.city  || '—';
        const state   = s.state || '';
        const address = s.address || '';
        return `
            <button class="picker-studio-btn" onclick="pickStudio('${s.id}')">
                <div class="picker-city">${city}</div>
                ${state ? `<div class="picker-state">${state}</div>` : ''}
                ${address ? `<div class="picker-address">${address}</div>` : ''}
                <i class="fas fa-chevron-right picker-arrow"></i>
            </button>`;
    }).join('');
}

function pickStudio(studioId) {
    closePicker();
    const studio = allStudios.find(s => s.id === studioId);
    if (studio) openStudioModal(studio);
}

function closePicker() {
    document.getElementById('pickerOverlay').classList.remove('active');
    document.body.style.overflow = '';
}

/* ── STUDIO DETAIL MODAL ── */
// Section definitions — six sections, each with a renderer that returns HTML
// or null/empty to indicate no data.
const MODAL_SECTIONS = [
    { id: 'overview',   label: 'Overview',           icon: 'fa-info-circle' },
    { id: 'contact',    label: 'Contact & People',   icon: 'fa-address-book' },
    { id: 'money',      label: 'Pricing & Money',    icon: 'fa-dollar-sign' },
    { id: 'programs',   label: 'Programs & Instruments', icon: 'fa-music' },
    { id: 'policies',   label: 'Policies & Notes',   icon: 'fa-file-alt' },
    { id: 'resources',  label: 'Resources',          icon: 'fa-link' },
];

let currentStudio = null;
let scrollSpyObserver = null;

function openStudioModal(studio) {
    currentStudio = studio;
    const loc = [studio.city, studio.state].filter(Boolean).join(', ');
    const brandName = studio.brand?.name || 'Unnamed Studio';

    document.getElementById('modalTitle').textContent = brandName;
    const zoneBadge = document.getElementById('modalZone');
    if (studio.zone) { zoneBadge.textContent = studio.zone; zoneBadge.style.display = 'block'; }
    else { zoneBadge.style.display = 'none'; }
    document.getElementById('modalLocation').innerHTML = loc
        ? `<i class="fas fa-map-marker-alt"></i><span>${loc}</span>` : '';

    // Reset search
    document.getElementById('modalSearch').value = '';
    document.getElementById('modalSearchClear').classList.remove('visible');
    document.getElementById('modalSearchInfo').classList.remove('visible');

    buildModalContent(studio);
    setupScrollSpy();

    const hasSchedule = studio.scheduling_link && studio.scheduling_link.trim();
    document.getElementById('modalFooter').innerHTML = hasSchedule
        ? `<a href="${studio.scheduling_link}" target="_blank" class="modal-action-btn primary"><i class="fas fa-calendar"></i> View Schedule</a>`
        : `<span class="modal-action-btn primary disabled"><i class="fas fa-calendar"></i> No Schedule Link</span>`;

    document.getElementById('studioModal').classList.add('active');
    document.body.style.overflow = 'hidden';

    // Reset scroll position
    document.getElementById('modalContent').scrollTop = 0;
}

function closeModal() {
    document.getElementById('studioModal').classList.remove('active');
    document.body.style.overflow = '';
    if (scrollSpyObserver) { scrollSpyObserver.disconnect(); scrollSpyObserver = null; }
    currentStudio = null;
}

function jumpToSection(sectionId) {
    const target = document.getElementById('section-' + sectionId);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function setupScrollSpy() {
    if (scrollSpyObserver) scrollSpyObserver.disconnect();
    const root = document.getElementById('modalContent');
    if (!root) return;

    scrollSpyObserver = new IntersectionObserver((entries) => {
        // Pick the entry closest to the top of the viewport
        const visible = entries.filter(e => e.isIntersecting);
        if (visible.length === 0) return;
        // Sort by boundingClientRect.top — smallest (closest to top) wins
        visible.sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
        const id = visible[0].target.dataset.sectionId;
        document.querySelectorAll('.modal-nav-item').forEach(el => {
            el.classList.toggle('active', el.dataset.sectionId === id);
        });
    }, { root, rootMargin: '-10% 0px -70% 0px', threshold: 0 });

    document.querySelectorAll('.modal-section').forEach(el => scrollSpyObserver.observe(el));
}

function buildModalContent(s) {
    const sectionRenderers = {
        overview:  () => renderOverviewSection(s),
        contact:   () => renderContactSection(s),
        money:     () => renderMoneySection(s),
        programs:  () => renderProgramsSection(s),
        policies:  () => renderPoliciesSection(s),
        resources: () => renderResourcesSection(s),
    };

    const sectionData = MODAL_SECTIONS.map(sec => {
        const r = sectionRenderers[sec.id]();
        return { ...sec, html: r.html, count: r.count, isEmpty: r.count === 0 };
    });

    // Sidebar
    const sidebarHtml = sectionData.map((sec, i) => `
        <button class="modal-nav-item ${i === 0 ? 'active' : ''} ${sec.isEmpty ? 'empty' : ''}"
                data-section-id="${sec.id}"
                onclick="jumpToSection('${sec.id}')">
            <i class="fas ${sec.icon}"></i>
            <span class="nav-label">${sec.label}</span>
            <span class="nav-count">${sec.isEmpty ? 'empty' : sec.count}</span>
        </button>
    `).join('');
    document.getElementById('modalSidebar').innerHTML = sidebarHtml;

    // Content pane — all six sections, always visible (per user spec)
    const contentHtml = sectionData.map(sec => `
        <section class="modal-section" id="section-${sec.id}" data-section-id="${sec.id}">
            <div class="modal-section-header">
                <i class="fas ${sec.icon}"></i>
                <h3>${sec.label}</h3>
            </div>
            ${sec.isEmpty
                ? `<div class="modal-section-empty">No ${sec.label.toLowerCase()} information available for this studio</div>`
                : sec.html}
        </section>
    `).join('');
    document.getElementById('modalContent').innerHTML = contentHtml;
}

/* ── SECTION RENDERERS ──
   Each returns { html, count } where count is "informational items present"
   (used for sidebar badges and empty-state detection). */

function renderOverviewSection(s) {
    const fullAddress = [s.address, s.city, s.state].filter(Boolean).join(', ');
    const mapsUrl = fullAddress ? 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(fullAddress) : '';

    const coreFields = [s.address, s.parking, s.landmarks, s.time_zone, s.general_notes, s.summary_vibe, s.security_notes].filter(Boolean);
    if (coreFields.length === 0 && !s.brand?.name && !s.zone && !s.city && !s.state) return { html: '', count: 0 };

    let html = `
        <div class="info-grid-2col">
            ${renderInfoRow('fa-building','Brand', s.brand?.name)}
            ${renderInfoRow('fa-layer-group','Zone', s.zone)}
            ${renderInfoRow('fa-city','City', s.city)}
            ${renderInfoRow('fa-flag-usa','State', s.state)}
            ${renderInfoRow('fa-clock','Time Zone', s.time_zone)}
            ${s.address ? `
                <div class="info-row full-width">
                    <i class="fas fa-location-dot"></i>
                    <div class="info-row-content">
                        <div class="info-row-label">Address</div>
                        <div class="info-row-value"><a href="${mapsUrl}" target="_blank">${s.address} <i class="fas fa-external-link-alt" style="font-size:0.75rem;"></i></a></div>
                    </div>
                </div>` : ''}
            ${renderInfoRow('fa-car','Parking', s.parking, true)}
            ${renderInfoRow('fa-landmark','Landmarks', s.landmarks, true)}
        </div>`;
    if (s.general_notes)  html += `<div class="modal-subsection"><div class="modal-subsection-title"><i class="fas fa-file-alt"></i> General Notes</div><div class="info-rich-content">${s.general_notes}</div></div>`;
    if (s.summary_vibe)   html += `<div class="modal-subsection"><div class="modal-subsection-title"><i class="fas fa-heart"></i> Studio Vibe</div><div class="info-rich-content">${s.summary_vibe}</div></div>`;
    if (s.security_notes) html += `<div class="modal-subsection"><div class="modal-subsection-title"><i class="fas fa-shield-alt"></i> Safety & Supervision</div><div class="info-rich-content">${s.security_notes}</div></div>`;

    // Count: each populated info field, plus each rich subsection
    const count = [s.brand?.name, s.zone, s.city, s.state, s.time_zone, s.address, s.parking, s.landmarks, s.general_notes, s.summary_vibe, s.security_notes].filter(Boolean).length;
    return { html, count };
}

function renderContactSection(s) {
    const baseFields = [s.phone_number, s.director_name, s.director_email, s.scheduling_link, s.admin_office_hours].filter(Boolean);
    const adminCount = (s.admins || []).length;
    if (baseFields.length === 0 && adminCount === 0) return { html: '', count: 0 };

    let html = `
        <div class="info-list">
            ${renderInfoRow('fa-phone','Phone Number', s.phone_number)}
            ${renderInfoRow('fa-user-tie','Director Name', s.director_name)}
            ${renderInfoRow('fa-envelope','Director Email', s.director_email, false, 'email')}
            ${renderInfoRow('fa-calendar','Scheduling Link', s.scheduling_link, false, 'link')}
            ${renderInfoRow('fa-clock','Admin Office Hours', s.admin_office_hours)}
        </div>`;

    if (adminCount > 0) {
        html += `
            <div class="modal-subsection">
                <div class="modal-subsection-title"><i class="fas fa-users"></i> Studio Admins (${adminCount})</div>
                <div class="info-list-cards">
                    ${s.admins.map(a => `
                        <div class="info-list-card">
                            <div class="info-list-card-title">${a.name || 'Unnamed Admin'}</div>
                            ${a.email ? `<div class="info-list-card-detail"><i class="fas fa-envelope"></i><a href="mailto:${a.email}">${a.email}</a></div>` : ''}
                        </div>`).join('')}
                </div>
            </div>`;
    }

    return { html, count: baseFields.length + adminCount };
}

function renderMoneySection(s) {
    const rateFields = [s.monthly_rate, s.price_45, s.price_60, s.annual_fee, s.display_annual_fee].filter(Boolean);
    const discountCount = (s.discounts || []).length;
    const scholarshipCount = (s.scholarships || []).length;
    if (rateFields.length === 0 && discountCount === 0 && scholarshipCount === 0) return { html: '', count: 0 };

    let html = '';
    if (rateFields.length > 0) {
        html += `
            <div class="modal-subsection">
                <div class="modal-subsection-title"><i class="fas fa-dollar-sign"></i> Rates & Fees</div>
                <div class="info-grid-2col">
                    ${renderInfoRow('fa-dollar-sign','30-Min Rate', s.monthly_rate)}
                    ${renderInfoRow('fa-dollar-sign','45-Min Rate', s.price_45)}
                    ${renderInfoRow('fa-dollar-sign','60-Min Rate', s.price_60)}
                    ${renderInfoRow('fa-calendar-check','Annual Fee', s.annual_fee)}
                    ${renderInfoRow('fa-tag','Display Annual Fee', s.display_annual_fee)}
                </div>
            </div>`;
    }
    if (discountCount > 0) {
        html += `
            <div class="modal-subsection">
                <div class="modal-subsection-title"><i class="fas fa-percent"></i> Discounts (${discountCount})</div>
                <div class="info-list-cards">
                    ${s.discounts.map(d => `
                        <div class="info-list-card">
                            <div class="info-list-card-title">${d.title || 'Untitled Discount'}</div>
                            ${d.description ? `<div class="info-list-card-desc">${d.description}</div>` : ''}
                            ${d.link ? `<div class="info-list-card-detail"><i class="fas fa-link"></i><a href="${d.link}" target="_blank">View Link</a></div>` : ''}
                        </div>`).join('')}
                </div>
            </div>`;
    }
    if (scholarshipCount > 0) {
        html += `
            <div class="modal-subsection">
                <div class="modal-subsection-title"><i class="fas fa-graduation-cap"></i> Scholarships (${scholarshipCount})</div>
                <div class="info-list-cards">
                    ${s.scholarships.map(sc => `
                        <div class="info-list-card">
                            <div class="info-list-card-title">${sc.title || 'Untitled Scholarship'}</div>
                            ${sc.notes ? `<div class="info-list-card-desc">${sc.notes}</div>` : ''}
                            ${sc.link ? `<div class="info-list-card-detail"><i class="fas fa-link"></i><a href="${sc.link}" target="_blank">Apply / Learn More</a></div>` : ''}
                        </div>`).join('')}
                </div>
            </div>`;
    }
    return { html, count: rateFields.length + discountCount + scholarshipCount };
}

function renderProgramsSection(s) {
    const hasPrograms = s.programs_enabled;
    const hasRentals = s.rentals_enabled;
    const instCount = (s.instruments || []).length;
    if (!hasPrograms && !hasRentals && instCount === 0 && !s.rental_info && !s.rental_link) return { html: '', count: 0 };

    let html = `
        <div class="info-grid-2col">
            ${renderInfoRow('fa-graduation-cap','Programs', s.programs_enabled ? 'Available' : 'Not Available')}
            ${renderInfoRow('fa-guitar','Rentals', s.rentals_enabled ? 'Available' : 'Not Available')}
        </div>`;

    if (s.rentals_enabled && s.rental_info) {
        html += `<div class="modal-subsection"><div class="modal-subsection-title"><i class="fas fa-guitar"></i> Rental Information</div><div class="info-rich-content">${s.rental_info}</div></div>`;
    }
    if (s.rental_link) {
        html += `<div class="modal-subsection"><div class="info-row full-width"><i class="fas fa-link"></i><div class="info-row-content"><div class="info-row-label">Rental Link</div><div class="info-row-value"><a href="${s.rental_link}" target="_blank">${s.rental_link}</a></div></div></div></div>`;
    }
    if (instCount > 0) {
        html += `
            <div class="modal-subsection">
                <div class="modal-subsection-title"><i class="fas fa-music"></i> Instruments (${instCount})</div>
                <div class="info-list-cards">
                    ${s.instruments.map(inst => `
                        <div class="info-list-card instrument-card">
                            <div class="info-list-card-title"><i class="fas fa-music"></i> ${inst.name||inst.instrument||'Unknown'}</div>
                            ${inst.notes?`<div class="info-list-card-field"><span class="field-label">Notes:</span><span class="field-value">${inst.notes}</span></div>`:''}
                            ${inst.materials?`<div class="info-list-card-field"><span class="field-label">Materials:</span><span class="field-value">${inst.materials}</span></div>`:''}
                        </div>`).join('')}
                </div>
            </div>`;
    }

    let count = 0;
    if (hasPrograms) count++;
    if (hasRentals) count++;
    if (s.rental_info) count++;
    if (s.rental_link) count++;
    count += instCount;
    return { html, count };
}

function renderPoliciesSection(s) {
    const defPolicies = (s.policies||[]).filter(p => p.policy_type === 'default');
    const custPolicies = (s.policies||[]).filter(p => p.policy_type === 'custom' || (!p.policy_type && !p.policy_key));
    const noteCount = (s.studio_notes || []).length;
    const hasCustomerCare = !!(s.customer_care_title || s.customer_care_subtitle || s.customer_care_notes);
    if (defPolicies.length === 0 && custPolicies.length === 0 && noteCount === 0 && !hasCustomerCare) return { html: '', count: 0 };

    let html = '';
    if (defPolicies.length) {
        html += `<div class="modal-subsection"><div class="modal-subsection-title"><i class="fas fa-file-alt"></i> Standard Policies (${defPolicies.length})</div><div class="info-list-cards">${defPolicies.map(p=>`<div class="info-list-card"><div class="info-list-card-title">${p.title||'Untitled'}</div>${p.subtitle?`<div class="info-list-card-subtitle">${p.subtitle}</div>`:''} ${p.notes?`<div class="info-list-card-desc">${p.notes}</div>`:''} ${p.link?`<div class="info-list-card-detail"><i class="fas fa-link"></i><a href="${p.link}" target="_blank">View Policy</a></div>`:''}</div>`).join('')}</div></div>`;
    }
    if (custPolicies.length) {
        html += `<div class="modal-subsection"><div class="modal-subsection-title"><i class="fas fa-plus-circle"></i> Additional Policies (${custPolicies.length})</div><div class="info-list-cards">${custPolicies.map(p=>`<div class="info-list-card"><div class="info-list-card-title">${p.title||'Untitled'}</div>${p.subtitle?`<div class="info-list-card-subtitle">${p.subtitle}</div>`:''} ${p.notes?`<div class="info-list-card-desc">${p.notes}</div>`:''} ${p.link?`<div class="info-list-card-detail"><i class="fas fa-link"></i><a href="${p.link}" target="_blank">View Policy</a></div>`:''}</div>`).join('')}</div></div>`;
    }
    if (noteCount > 0) {
        html += `<div class="modal-subsection"><div class="modal-subsection-title"><i class="fas fa-sticky-note"></i> Studio Notes (${noteCount})</div><div class="info-list-cards">${s.studio_notes.map(n=>`<div class="info-list-card"><div class="info-list-card-title">${n.title||'Untitled Note'}</div>${n.subtitle?`<div class="info-list-card-subtitle">${n.subtitle}</div>`:''} ${n.notes?`<div class="info-list-card-desc">${n.notes}</div>`:''} ${n.link?`<div class="info-list-card-detail"><i class="fas fa-link"></i><a href="${n.link}" target="_blank">View Link</a></div>`:''}</div>`).join('')}</div></div>`;
    }
    if (hasCustomerCare) {
        html += `<div class="modal-subsection"><div class="modal-subsection-title"><i class="fas fa-headset"></i> Customer Care</div>`;
        html += `<div class="info-list">${renderInfoRow('fa-heading','Title', s.customer_care_title)}${renderInfoRow('fa-text-height','Subtitle', s.customer_care_subtitle)}</div>`;
        if (s.customer_care_notes) html += `<div style="margin-top:0.625rem;"><div class="info-rich-content">${s.customer_care_notes}</div></div>`;
        html += `</div>`;
    }

    return { html, count: defPolicies.length + custPolicies.length + noteCount + (hasCustomerCare ? 1 : 0) };
}

function renderResourcesSection(s) {
    const linkCount = (s.custom_links || []).length;
    if (linkCount === 0) return { html: '', count: 0 };

    const html = `
        <div class="info-list-cards">
            ${s.custom_links.map(l => `
                <div class="info-list-card">
                    <div class="info-list-card-title">${l.header||'Untitled Link'}</div>
                    ${l.subheader?`<div class="info-list-card-subtitle">${l.subheader}</div>`:''}
                    ${l.url?`<div class="info-list-card-detail"><i class="fas fa-external-link-alt"></i><a href="${l.url}" target="_blank">${l.url}</a></div>`:''}
                </div>`).join('')}
        </div>`;
    return { html, count: linkCount };
}

/* ── MODAL SEARCH (filter & highlight inside the open studio) ── */
function clearModalSearch() {
    document.getElementById('modalSearch').value = '';
    document.getElementById('modalSearchClear').classList.remove('visible');
    document.getElementById('modalSearchInfo').classList.remove('visible');
    if (currentStudio) {
        // Re-render to strip highlights and unhide hidden subsections
        buildModalContent(currentStudio);
        setupScrollSpy();
    }
    // Reset sidebar match-hit state
    document.querySelectorAll('.modal-nav-item').forEach(el => el.classList.remove('match-hit'));
}

function onModalSearchInput(e) {
    const q = e.target.value.trim();
    document.getElementById('modalSearchClear').classList.toggle('visible', q.length > 0);
    if (!currentStudio) return;
    if (!q) {
        clearModalSearch();
        return;
    }
    runModalSearch(q);
}

function runModalSearch(query) {
    if (!currentStudio) return;
    // Always rebuild from clean state, then apply filtering + highlights on the DOM
    buildModalContent(currentStudio);
    setupScrollSpy();

    const lower = query.toLowerCase();
    const sections = document.querySelectorAll('.modal-section');
    let totalMatches = 0;
    const sectionMatchCounts = {};

    sections.forEach(section => {
        const sectionId = section.dataset.sectionId;
        const items = section.querySelectorAll('.info-row, .info-list-card, .modal-subsection');
        let sectionHits = 0;

        // For each leaf item, check if it contains the search term
        const examined = new Set();
        items.forEach(item => {
            // Skip items that are children of other items we'll already examine
            if (examined.has(item)) return;
            // For .modal-subsection containers, we'll handle their inner items separately
            const isSubsection = item.classList.contains('modal-subsection');

            if (!isSubsection) {
                const text = item.textContent.toLowerCase();
                const matches = text.includes(lower);
                if (matches) {
                    sectionHits++;
                    highlightWithinElement(item, query);
                } else {
                    item.style.display = 'none';
                }
            }
        });

        // After leaf-item processing, hide any subsection whose visible children are all hidden
        section.querySelectorAll('.modal-subsection').forEach(sub => {
            const innerItems = sub.querySelectorAll('.info-row, .info-list-card, .info-list, .info-grid-2col, .info-rich-content');
            // If the subsection title text itself matches, keep it open
            const titleEl = sub.querySelector('.modal-subsection-title');
            const titleMatches = titleEl && titleEl.textContent.toLowerCase().includes(lower);

            if (titleMatches) {
                // Show subsection and ALL its inner items
                sub.style.display = '';
                sub.querySelectorAll('.info-row, .info-list-card').forEach(it => it.style.display = '');
                if (titleEl) highlightWithinElement(titleEl, query);
                sectionHits++;
            } else {
                // Hide the subsection only if every leaf inside is now hidden
                const anyVisible = [...sub.querySelectorAll('.info-row, .info-list-card')].some(el => el.style.display !== 'none');
                if (!anyVisible) sub.style.display = 'none';
            }
        });

        // Hide section header & section if nothing matched
        if (sectionHits === 0) {
            section.classList.add('search-hidden');
        } else {
            section.classList.remove('search-hidden');
            sectionMatchCounts[sectionId] = sectionHits;
            totalMatches += sectionHits;
        }
    });

    // Update sidebar to reflect search hits
    document.querySelectorAll('.modal-nav-item').forEach(el => {
        const id = el.dataset.sectionId;
        const count = sectionMatchCounts[id] || 0;
        el.classList.toggle('match-hit', count > 0);
        el.classList.toggle('empty', count === 0);
        const badge = el.querySelector('.nav-count');
        if (badge) badge.textContent = count > 0 ? count : 'no match';
    });

    // Results info bar
    const info = document.getElementById('modalSearchInfo');
    if (totalMatches > 0) {
        info.innerHTML = `<strong>${totalMatches}</strong> match${totalMatches !== 1 ? 'es' : ''} for "${escapeHtml(query)}"`;
    } else {
        info.innerHTML = `No matches for "${escapeHtml(query)}" in this studio`;
    }
    info.classList.add('visible');
}

function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlightWithinElement(el, query) {
    // Walk text nodes only (don't touch attributes or existing <mark>s)
    const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, {
        acceptNode: node => {
            // Skip text inside <mark> already (idempotency)
            if (node.parentElement && node.parentElement.tagName === 'MARK') return NodeFilter.FILTER_REJECT;
            // Skip whitespace-only nodes
            if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
        }
    });
    const targets = [];
    let n; while ((n = walker.nextNode())) targets.push(n);

    const lowerQ = query.toLowerCase();
    targets.forEach(textNode => {
        const value = textNode.nodeValue;
        const lower = value.toLowerCase();
        if (!lower.includes(lowerQ)) return;
        const frag = document.createDocumentFragment();
        let i = 0;
        while (i < value.length) {
            const idx = lower.indexOf(lowerQ, i);
            if (idx === -1) {
                frag.appendChild(document.createTextNode(value.substring(i)));
                break;
            }
            if (idx > i) frag.appendChild(document.createTextNode(value.substring(i, idx)));
            const mark = document.createElement('mark');
            mark.className = 'search-match';
            mark.textContent = value.substring(idx, idx + query.length);
            frag.appendChild(mark);
            i = idx + query.length;
        }
        textNode.parentNode.replaceChild(frag, textNode);
    });
}


function renderInfoRow(icon, label, value, fullWidth = false, type = 'text') {
    let displayValue = 'Not provided';
    let emptyClass = 'empty';
    if (value !== null && value !== undefined && value !== '') {
        emptyClass = '';
        displayValue = value;
        if (type === 'link' && value) {
            const url = value.startsWith('http') ? value : `https://${value}`;
            displayValue = `<a href="${url}" target="_blank">${value}</a>`;
        } else if (type === 'email' && value) {
            displayValue = `<a href="mailto:${value}">${value}</a>`;
        }
    }
    return `
        <div class="info-row ${fullWidth ? 'full-width' : ''}">
            <i class="fas ${icon}"></i>
            <div class="info-row-content">
                <div class="info-row-label">${label}</div>
                <div class="info-row-value ${emptyClass}">${displayValue}</div>
            </div>
        </div>`;
}

/* ── CATEGORY TABS ── */
function renderTabs() {
    document.getElementById('categoryTabs').innerHTML = categories.map(cat => `
        <button class="tab ${activeCategory === cat.id ? 'active' : ''}" onclick="switchCategory('${cat.id}')">${cat.name}</button>
    `).join('');
}

function renderTabContents() {
    document.getElementById('tabContents').innerHTML = categories.map(cat => {
        const catLinks = links.filter(l => l.category_id === cat.id);
        return `
            <div class="tab-content ${activeCategory === cat.id ? 'active' : ''}" id="category-${cat.id}">
                ${!catLinks.length ? '<div class="empty-state"><i class="fas fa-link"></i><p>No links in this category</p></div>' : `
                <div class="links-grid">
                    ${catLinks.map(l => `
                        <a href="${l.url}" class="link-card" target="_blank">
                            <div class="link-content">
                                <div class="link-title">${l.title}</div>
                                ${l.subtitle ? `<div class="link-subtitle">${l.subtitle}</div>` : ''}
                            </div>
                            <div class="link-arrow"><i class="fas fa-arrow-right"></i></div>
                        </a>`).join('')}
                </div>`}
            </div>`;
    }).join('');
}

function switchCategory(catId) {
    activeCategory = catId;
    renderTabs();
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    const el = document.getElementById(`category-${catId}`);
    if (el) el.classList.add('active');
}
